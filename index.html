<script>
// Verificar rota portal ANTES do Babel carregar
(function(){
  var path = window.location.pathname;
  var m = path.match(/\/processo\/([A-Za-z0-9]+)$/);
  if(!m) return;
  var token = m[1];
  var SUPA_URL = "https://dnykryfwvylivzfetjko.supabase.co";
  var SUPA_KEY = "sb_publishable_Ep1D6wtOw9z3GtEFc-4WiA_LhO_3aYn";
  var root = document.getElementById("root");

  var EJ = [
    {k:"protocolado",l:"Protocolado"},
    {k:"audiencia_conciliacao",l:"Audiência de Conciliação"},
    {k:"tramitacao",l:"Em Tramitação"},
    {k:"audiencia_instrucao",l:"Audiência de Instrução e Julgamento"},
    {k:"sentenca",l:"Sentença"}
  ];
  var EA = [
    {k:"iniciado",l:"Iniciado"},
    {k:"diligencias",l:"Diligências Internas"},
    {k:"cartorio_notas",l:"Cartório de Notas"},
    {k:"cartorio_registro",l:"Cartório de Registro"},
    {k:"concluso",l:"Concluso"}
  ];

  function fmtDt(d){if(!d)return"";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}

  root.innerHTML = '<div style="font-family:Outfit,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f1f5f9;color:#475569"><div style="text-align:center"><div style="font-size:28px;margin-bottom:12px">◎</div><div style="font-size:14px;font-weight:600">Carregando...</div></div></div>';

  fetch(SUPA_URL+"/rest/v1/servicos?select=tipo,tipo_processo,portal,clientes(nome)&portal->>token=eq."+token, {
    headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}
  }).then(function(r){return r.json();}).then(function(data){
    if(!data||data.length===0){
      root.innerHTML='<div style="font-family:Outfit,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f1f5f9"><div style="text-align:center;background:white;padding:32px;border-radius:14px;max-width:320px"><div style="font-size:32px;margin-bottom:12px;color:#ef4444">◈</div><div style="font-size:14px;font-weight:700;color:#ef4444;margin-bottom:6px">Processo não encontrado</div><div style="font-size:12px;color:#94a3b8">Verifique o link ou entre em contato com o escritório.</div></div></div>';
      return;
    }
    var d = data[0];
    var isJ = d.tipo_processo === "judicial";
    var estagios = isJ ? EJ : EA;
    var portal = d.portal || {};
    var eAtual = portal.estagio_atual || estagios[0].k;
    var idx = estagios.findIndex ? estagios.findIndex(function(e){return e.k===eAtual;}) : 0;
    for(var i=0;i<estagios.length;i++){if(estagios[i].k===eAtual){idx=i;break;}}
    var cor = isJ ? "#b46464" : "#4a6a9a";
    var nome = (d.clientes && d.clientes.nome) || "";
    var datas = portal.datas || {};

    var tlHTML = estagios.map(function(e,i){
      var done = i < idx;
      var active = i === idx;
      var pending = i > idx;
      var bg = done?"#5a8f6e":active?cor:"white";
      var border = done?"#5a8f6e":active?cor:"#d6d3cc";
      var txtCor = done?"#15803d":active?cor:"#8a8782";
      var tagBg = done?"#f0fdf4":active?(isJ?"#fef2f2":"#eff6ff"):"#f8fafc";
      var tagCor = done?"#4a7a5e":active?cor:"#8a8782";
      var tagTxt = done?(fmtDt(datas[e.k])||"Concluído"):active?"Em andamento":"Aguardando";
      var lineColor = done?"#5a8f6e":"#d6d3cc";
      return '<div style="display:flex;gap:14px">'
        +'<div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0">'
        +'<div style="width:28px;height:28px;border-radius:50%;background:'+bg+';border:2px solid '+border+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:'+(done||active?'white':'#cbd5e1')+';flex-shrink:0">'+(done?'✓':(i+1))+'</div>'
        +(i<estagios.length-1?'<div style="width:2px;flex:1;min-height:24px;background:'+lineColor+'"></div>':'')
        +'</div>'
        +'<div style="padding:2px 0 20px;flex:1">'
        +'<div style="font-size:13px;font-weight:700;color:'+txtCor+';margin-bottom:2px">'+e.l+'</div>'
        +'<div style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block;background:'+tagBg+';color:'+tagCor+'">'+tagTxt+'</div>'
        +'</div>'
        +'</div>';
    }).join("");

    root.innerHTML =
      '<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>'
      +'<div style="font-family:Outfit,sans-serif;background:#f1f5f9;min-height:100vh">'
      // Header
      +'<div style="background:'+(isJ?'linear-gradient(135deg,#0f172a,#3b0a0a)':'linear-gradient(135deg,#0f172a,#1e3a5f)')+';padding:24px 20px 28px">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">'
      +'<div style="width:36px;height:36px;background:linear-gradient(135deg,#1e3a5f,#3b82f6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white">DI</div>'
      +'<div><div style="font-size:13px;font-weight:800;color:white">DocImóvel PRO</div><div style="font-size:10px;color:#94a3b8">Acompanhamento de Processo</div></div>'
      +'</div>'
      +'<div style="font-size:20px;font-weight:800;color:white;margin-bottom:3px">'+nome+'</div>'
      +'<div style="font-size:12px;color:#94a3b8">'+d.tipo+'</div>'
      +'<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;display:inline-block;margin-top:6px;background:'+cor+'22;color:'+cor+';border:1px solid '+cor+'33">'+(isJ?'Processo Judicial':'Processo Extrajudicial')+'</span>'
      +'</div>'
      // Body
      +'<div style="max-width:480px;margin:0 auto;padding:20px 16px">'
      // Status
      +'<div style="background:white;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 12px #00000010;border-left:4px solid '+cor+'">'
      +'<div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Situação atual</div>'
      +'<div style="font-size:16px;font-weight:800;color:'+cor+';margin-bottom:2px">'+estagios[idx].l+'</div>'
      +(datas[eAtual]?'<div style="font-size:11px;color:#94a3b8">Atualizado em '+fmtDt(datas[eAtual])+'</div>':'')
      +'</div>'
      // Timeline
      +'<div style="background:white;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 12px #00000010">'
      +'<div style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:16px">Andamento do processo</div>'
      +tlHTML
      +'</div>'
      // Info
      +'<div style="background:white;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 12px #00000010">'
      +'<div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px">Informações</div>'
      +'<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="color:#94a3b8">Tipo</span><span style="font-weight:600;color:#1e293b">'+d.tipo+'</span></div>'
      +'<div style="display:flex;justify-content:space-between;padding:7px 0;font-size:13px"><span style="color:#94a3b8">Protocolo criado em</span><span style="font-weight:600;color:#1e293b">'+fmtDt(datas[estagios[0].k]||'')+'</span></div>'
      +'</div>'
      // Contato
      +'<div style="background:white;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 12px #00000010;text-align:center">'
      +'<div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px">Em caso de dúvidas, entre em contato.</div>'
      +'<div style="font-size:11px;color:#94a3b8;line-height:1.6">* Algumas atualizações podem apresentar pequeno atraso em relação ao andamento real do processo.</div>'
      +'</div>'
      +'<div style="padding:16px;text-align:center;font-size:11px;color:#94a3b8">2026 · © Carlos Alberto Pacheco · Todos os direitos reservados</div>'
      +'</div>'
      +'</div>';

    // Stop Babel from loading since we don't need it
    document.querySelectorAll('script[type="text/babel"]').forEach(function(s){s.type='text/disabled';});
  }).catch(function(){
    root.innerHTML='<div style="font-family:Outfit,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f1f5f9"><div style="text-align:center;background:white;padding:32px;border-radius:14px"><div style="font-size:14px;font-weight:700;color:#ef4444">Erro ao carregar. Tente novamente.</div></div></div>';
  });
  // Prevent Babel from running the main app
  window._isPortal = true;
})();
</script>

};

  const hoje=new Date();

  // Agenda: agendamentos dos próximos 3 dias + vencidos

  const _ddA=(data)=>{if(!data)return 99;return Math.round((new Date(data+"T12:00:00")-_hj)/(864e5));};
  const agendaCard=[
    ...(agendaItens||[]).filter(a=>a.status!=="cancelado"&&a.status!=="realizado"&&_ddA(a.data)<0)
      .map(a=>{const d=_ddA(a.data);return{...a,cor:"#b46464",lbl:d+"d",tipo:"agenda"};}),
    ...(agendaItens||[]).filter(a=>a.status!=="cancelado"&&a.status!=="realizado"&&_ddA(a.data)===0)

    ...(agendaItens||[]).filter(a=>{
      if(a.status==="cancelado"||a.status==="realizado")return false;

const TelaServicos=({servicos,search,setSearch,cn,abrirModal,abrirServico,setPrintData,setServicos,showToast,clientes})=>{
  const [filtroStatus,setFiltroStatus]=useState("todos");
  const [filtroTipo,setFiltroTipo]=useState("");
  const [filtroEstagio,setFiltroEstagio]=useState("");

  const orcA=servicos.filter(s=>s.orcamento?.status==="Orçamento");

  const filtrados=servicos.filter(s=>{
    const q=(search||"").toLowerCase();
    const nomeCliente=(cn(s.clienteId||s.cliente_id)||"").toLowerCase();
    const cli=clientes?.find(c=>c.id===(s.clienteId||s.cliente_id));
    const cpfCliente=(cli?.cpf||"").toLowerCase();
    const matchBusca=!q||nomeCliente.includes(q)||cpfCliente.includes(q)||(s.protocolo||"").toLowerCase().includes(q)||(s.tipo||"").toLowerCase().includes(q);
    const matchStatus=filtroStatus==="todos"||(filtroStatus==="concluido"&&(s.status==="Concluído"||s.status==="Concluido"))||(filtroStatus==="aberto"&&s.status!=="Concluído"&&s.status!=="Concluido");
    const matchTipo=!filtroTipo||s.tipoProcesso===filtroTipo;
    const matchEstagio=!filtroEstagio||s.estagio===filtroEstagio;
    return matchBusca&&matchStatus&&matchTipo&&matchEstagio;
  });

  const estagiosUnicos=[...new Set(servicos.map(s=>s.estagio).filter(Boolean))].sort();

  return(<div style={S.tela}><PageHeader title="Serviços / Protocolos" sub={filtrados.length+" de "+servicos.length+" serviço(s)"}>
    <input style={S.search} placeholder="Buscar por nome, CPF, protocolo, tipo..." value={search} onChange={e=>setSearch(e.target.value)}/>
    <button style={S.btnPrimary} onClick={()=>abrirModal("servico",{orcamento:{valor:"",desconto:0,obs:"",status:"Orçamento"},checklist:{},outrosDesc:""})} className="bp">+ Novo Serviço</button>
  </PageHeader>

const getHistRec=()=>window._histRec||[];

};

const TelaServicoDetalhe=({servico,clientes,aba,setAba,atualizar,voltar,setPrintData,showToast,sb,abrirModal})=>{
  const cliente=clientes.find(c=>c.id===servico.clienteId);
  const [novaPag,setNovaPag]=useState({descricao:"",valor:"",forma:"PIX",data:td(),parcelado:false,totalParcelas:2});
  const [modalOrc,setModalOrc]=useState(null);
  const [editPag,setEditPag]=useState(null);
  const _hj=td();
  const totPago=(servico.pagamentos||[])
    .filter(p=>p.status==="pago"||((!p.status||p.status==="pendente")&&p.data<=_hj))
    .reduce((s,p)=>s+Number(p.valor),0);
  const valorLiq=Number(servico.orcamento?.valor||0)-Number(servico.orcamento?.desconto||0);
  const saldo=valorLiq-totPago;
  const addPag=()=>{
    if(!novaPag.descricao.trim()){if(showToast)showToast("Preencha a descricao.","erro");return;}
    if(!novaPag.valor||Number(novaPag.valor)<=0){if(showToast)showToast("Preencha o valor.","erro");return;}
    const grupoId="parc-"+Date.now();
    if(novaPag.parcelado&&novaPag.totalParcelas>1){
      const n=Number(novaPag.totalParcelas);
      const valParcela=Number((Number(novaPag.valor)/n).toFixed(2));
      const parcelas=[];
      let dataBase=new Date(novaPag.data+"T12:00:00");
      for(let i=0;i<n;i++){
        const d=new Date(dataBase);
        d.setMonth(d.getMonth()+i);
        parcelas.push({id:Date.now()+i,descricao:novaPag.descricao+" ("+(i+1)+"/"+n+")",valor:valParcela,forma:novaPag.forma,data:d.toISOString().slice(0,10),parcelado:true,totalParcelas:n,parcelaNumero:i+1,grupoParcela:grupoId,status:"pendente"});
      }
      atualizar({pagamentos:[...(servico.pagamentos||[]),...parcelas]});
      if(showToast)showToast(n+" parcelas registradas!");
    }else{
      atualizar({pagamentos:[...(servico.pagamentos||[]),{...novaPag,id:Date.now(),valor:Number(novaPag.valor),status:"pendente"}]});
      if(showToast)showToast("Pagamento registrado!");
    }
    setNovaPag({descricao:"",valor:"",forma:"PIX",data:td(),parcelado:false,totalParcelas:2});
  };
  const toggleCheck=(k)=>atualizar({checklist:{...(servico.checklist||{}),[k]:!(servico.checklist||{})[k]}});
  const [modalDilig2,setModalDilig2]=useState(null);
  const salvarDilig2=(form)=>{
    if(!form.descricao||!form.descricao.trim()){if(showToast)showToast("Informe a descrição.","erro");return;}
    const diligencias=form.id&&(servico.diligencias||[]).find(d=>d.id===form.id)
      ?(servico.diligencias||[]).map(d=>d.id===form.id?{...form}:d)
      :[...(servico.diligencias||[]),{...form,id:Date.now()}];
    atualizar({diligencias});
    setModalDilig2(null);
  };
  const dd2=(p)=>{if(!p)return 99;const t=new Date(p+"T12:00:00"),h=new Date(new Date().toDateString());return Math.ceil((t-h)/864e5);};
  const grupos2=[
    {l:"Vencidas",items:(servico.diligencias||[]).filter(d=>d.status!=="Concluída"&&d.prazo&&dd2(d.prazo)<0),c:"#b46464"},
    {l:"Hoje / Amanhã",items:(servico.diligencias||[]).filter(d=>d.status!=="Concluída"&&d.prazo&&dd2(d.prazo)>=0&&dd2(d.prazo)<=1),c:"#a06832"},
    {l:"Próximas",items:(servico.diligencias||[]).filter(d=>d.status!=="Concluída"&&(!d.prazo||dd2(d.prazo)>1)),c:"#5a7aaa"},
    {l:"Concluídas",items:(servico.diligencias||[]).filter(d=>d.status==="Concluída"),c:"#5a8f6e"},
  ];
  return(<div style={S.tela}>
    <PageHeader title={<span style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}><button onClick={voltar} style={S.backBtn} className="back">← Serviços</button><span style={S.proto}>{servico.protocolo}</span><Tag label={servico.estagio} color={ECOR[servico.estagio]||"#5a5d66"}/></span>} sub={servico.tipo+" - "+cliente?.nome||"-"}><button style={{...S.btnSm,color:"#5a7aaa",borderColor:"#3b82f644"}} onClick={()=>abrirModal&&abrirModal("servico",{...servico,tipoProcesso:servico.tipoProcesso||"extrajudicial",dadosJudiciais:servico.dadosJudiciais||{}})} className="bs">✏ Editar</button><button style={{...S.btnSm,color:"#a87840",borderColor:"#f59e0b44"}} onClick={()=>setPrintData(servico)} className="bs">🖨 Protocolo</button><button style={{...S.btnSm,color:"#a87840",borderColor:"#f59e0b44"}} onClick={()=>setPrintData({...servico,_via:true})} className="bs">🖨 Via Cliente</button></PageHeader>
    <div style={{display:"flex",gap:4,padding:"8px 24px",background:"#1e2128",borderBottom:"1px solid #0f1f35"}}>{[{k:"visao",l:"📌 Visão Geral"},{k:"checklist",l:"📄 Documentos"},{k:"diligencias",l:"⊙ Diligências"},{k:"pagamentos",l:"◉ Pagamentos"},{k:"contratos",l:"📋 Contratos"},{k:"portal",l:"◎ Portal Cliente"}].map(a=><button key={a.k} onClick={()=>setAba(a.k)} style={{...S.abaBtn,...(aba===a.k?S.abaBtnActive:{})}} className="ab">{a.l}</button>)}</div>

      {aba==="visao"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}><div style={S.card}><div style={S.cardTitle}>Dados do Cliente</div>{cliente&&<><InfoRow l="Nome" v={cliente.nome}/><InfoRow l={cliente.tipo==="pj"?"CNPJ":"CPF"} v={cliente.cpf||cliente.cnpj}/><InfoRow l="Telefone" v={cliente.telefone}/><InfoRow l="WhatsApp" v={cliente.whatsapp}/><InfoRow l="E-mail" v={cliente.email}/><InfoRow l="Endereço" v={cliente.endereco||""+", "+cliente.cidade||""+"/"+cliente.estado||""}/></>}</div><div style={S.card}><div style={{...S.cardTitle,display:"flex",justifyContent:"space-between"}}><span>Orcamento</span><button style={{...S.btnSm,color:"#a87840",borderColor:"#f59e0b33"}} onClick={()=>setModalOrc({valor:servico.orcamento?.valor||"",desconto:servico.orcamento?.desconto||"",obs:servico.orcamento?.obs||"",status:servico.orcamento?.status||"Orcamento"})} className="bs">Editar</button></div><InfoRow l="Valor total" v={"R$ "+fmt(servico.orcamento?.valor)}/><InfoRow l="Desconto" v={"R$ "+fmt(servico.orcamento?.desconto)}/><InfoRow l="Valor líquido" v={"R$ "+fmt(valorLiq)}/><InfoRow l="Total pago" v={"R$ "+fmt(totPago)}/><div style={{borderTop:"1px solid #0f1f35",marginTop:8,paddingTop:8}}><InfoRow l="Saldo restante" v={"R$ "+fmt(saldo)} hl={saldo>0}/></div><div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>{["Orçamento","Fechado","Concluído"].map(st=><button key={st} style={{...S.btnSm,...(servico.orcamento?.status===st?{background:"#3b82f622",color:"#5a7aaa",borderColor:"#3b82f644"}:{})}} onClick={()=>atualizar({orcamento:{...servico.orcamento,status:st}})} className="bs">{st}</button>)}</div><div style={{marginTop:10}}><FL l="Alterar estágio"/><select style={S.fi} value={servico.estagio||""} onChange={e=>{
  const isConcluido=e.target.value==="Concluído";
  const portal=servico.portal||{};
  const estagioFinal=servico.tipoProcesso==="judicial"?"sentenca":"concluso";
  const datas=portal.datas||{};
  if(isConcluido&&!datas[estagioFinal])datas[estagioFinal]=td();
  atualizar({
    estagio:e.target.value,
    status:isConcluido?"Concluído":"Aberto",
    dataConclusao:isConcluido?(servico.dataConclusao||td()):"",
    ...(isConcluido&&portal.token?{portal:{...portal,estagio_atual:estagioFinal,datas}}:{})
  });
}}>{ESTAGIOS.map(o=><option key={o}>{o}</option>)}</select>{servico.estagio==="Concluído"&&<div style={{marginTop:10,background:"#22c55e0d",border:"1px solid #22c55e33",borderRadius:8,padding:"10px"}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:11,color:"#5a8f6e",fontWeight:700}}>Concluído em:</span><input style={{...S.fi,width:"auto",flex:1}} type="date" value={servico.dataConclusao||td()} onChange={e=>atualizar({dataConclusao:e.target.value})}/></div><FL l="Observação de conclusão"/><textarea style={{...S.fi,minHeight:70,resize:"vertical"}} value={servico.obsConclusao||""} onChange={e=>atualizar({obsConclusao:e.target.value})} placeholder="Ex: Escritura entregue. Retirado por João Silva, CPF 000.000.000-00..."/></div>}</div></div></div>}
      {aba==="checklist"&&<div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div style={S.cardTitle}>Documentos Apresentados</div><button style={S.btnPrimary} onClick={()=>setPrintData({...servico,_via:true})} className="bp">🖨 Via do Cliente</button></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{CHECKLIST.map(item=><label key={item.key} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:7,background:"#16181d",border:"1px solid #0f1f35",cursor:"pointer"}} className="ci"><input type="checkbox" checked={!!(servico.checklist||{})[item.key]} onChange={()=>toggleCheck(item.key)} style={{accentColor:"#5a8f6e",width:15,height:15}}/><span style={{fontSize:13,color:(servico.checklist||{})[item.key]?"#d6d3cc":"#5a5d66"}}>{item.label}{item.pj&&<span style={{fontSize:10,color:"#7a6aaa"}}> [PJ]</span>}</span></label>)}</div><div style={{marginTop:14}}><FL l="Outros documentos"/><textarea style={{...S.fi,minHeight:60,resize:"vertical"}} value={servico.outrosDesc||""} onChange={e=>atualizar({outrosDesc:e.target.value})} placeholder="Descreva..."/></div></div>}
      {aba==="diligencias"&&<div>

                        </span>}

                      </div>

                    </div>

const AbaPublicacoes=({servico})=>{
  const [movs,setMovs]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [erro,setErro]=React.useState("");
  const [ultima,setUltima]=React.useState("");
  const numProc=(servico.dadosJudiciais?.numero||servico.dadosJudiciais?.numeroProcesso||servico.dados_judiciais?.numero||servico.dados_judiciais?.numeroProcesso||"").trim();
  const isJudicial=servico.tipoProcesso==="judicial";

  const TRIBUNAL_ENDPOINT="api_publica_tjba";
  const API_KEY="APIKey cDZHYzlZa0JadVREZDJCendQbXY6SkJlTzNjLV9TRENyQk1RdnFKZGRQdw==";

  const buscar=async()=>{
    if(!numProc){setErro("Número do processo não cadastrado neste serviço. Edite o serviço e preencha o campo Número do Processo.");return;}
    setLoading(true);setErro("");
    try{
      const r=await fetch("https://api-publica.datajud.cnj.jus.br/"+TRIBUNAL_ENDPOINT+"/_search",{
        method:"POST",
        headers:{"Authorization":API_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({query:{match:{"numeroProcesso.keyword":numProc}},size:1,_source:["movimentos","classe","orgaoJulgador","situacao","dataAjuizamento"]})
      });
      const d=await r.json();
      const hit=d?.hits?.hits?.[0];
      if(!hit){setErro("Processo não encontrado no DataJud/CNJ. Verifique o número cadastrado.");setLoading(false);return;}
      const movimentos=(hit._source?.movimentos||[]).sort((a,b)=>new Date(b.dataHora)-new Date(a.dataHora));
      setMovs(movimentos);
      setUltima(new Date().toLocaleString("pt-BR"));
    }catch(e){setErro("Não foi possível consultar o DataJud diretamente pelo browser (restrição CORS). Use o botão Abrir no PJe TJBA para consultar o processo.");}
    setLoading(false);
  };

  const fmtDt=(dt)=>{if(!dt)return"—";try{return new Date(dt).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});}catch{return dt;}};
  const getTipo=(cod)=>{const tipos={22:"Despacho",123:"Decisão",196:"Sentença",848:"Acórdão",132:"Intimação",11009:"Distribuição"};return tipos[cod]||"Movimentação";};
  const getCor=(cod)=>({22:"#a87840",123:"#7a6aaa",196:"#5a7aaa",848:"#6a6aaa",132:"#b46464",11009:"#5a8f6e"}[cod]||"#5a5d66");

  return(
    <div>
      {!isJudicial?(
        <div style={{...S.card,textAlign:"center",padding:32}}>
          <div style={{fontSize:32,marginBottom:10}}>◈</div>
          <div style={{fontSize:14,fontWeight:700,color:"#d6d3cc",marginBottom:6}}>Disponível apenas para processos judiciais</div>
          <div style={{fontSize:12,color:"#4a4d56"}}>Este serviço está cadastrado como extrajudicial.</div>
        </div>
      ):(
        <div>
          <div style={{...S.card,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#d6d3cc",marginBottom:3}}>Monitoramento via DataJud — CNJ</div>
                <div style={{fontSize:11,color:"#4a4d56"}}>Consulta pública gratuita · TJBA · {numProc?("Processo: "+numProc):"Número não cadastrado"}</div>
                {ultima&&<div style={{fontSize:11,color:"#5a8f6e",marginTop:2}}>Ultima consulta: {ultima}</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
              <button style={S.btnPrimary} onClick={buscar} className="bp" disabled={loading}>{loading?"Consultando...":"Consultar agora"}</button>
              {numProc&&<button style={{...S.btnSm,color:"#5a7aaa",borderColor:"#3b82f644"}} onClick={()=>window.open("https://pje.tjba.jus.br/pje/ConsultaPublica/listView.seam","_blank")} className="bs">Abrir no PJe TJBA</button>}
            </div>
            </div>
          </div>
          {erro&&<div style={{background:"#ef444408",border:"1px solid #ef444433",borderRadius:9,padding:"12px 16px",marginBottom:14,fontSize:12,color:"#b46464"}}>{erro}</div>}
          {!numProc&&!erro&&<div style={{background:"#f59e0b08",border:"1px solid #f59e0b33",borderRadius:9,padding:"12px 16px",marginBottom:14,fontSize:12,color:"#a87840"}}>Cadastre o número do processo no serviço (aba Visão Geral → Editar) para consultar as movimentações.</div>}
          {movs.length>0&&(
            <div style={S.card}>
              <div style={{...S.cardTitle,marginBottom:14}}>{movs.length} movimentações encontradas</div>
              {movs.map((m,i)=>{
                const cor=getCor(m.codigo);
                const tipo=getTipo(m.codigo);
                const isIntim=m.codigo===132;
                return(
                  <div key={i} style={{display:"flex",gap:12,paddingBottom:14,marginBottom:14,borderBottom:i<movs.length-1?"1px solid #0f1f35":"none"}}>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:10,flexShrink:0,paddingTop:4}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:cor,flexShrink:0}}></div>
                      {i<movs.length-1&&<div style={{width:2,flex:1,background:"#2a2d36",marginTop:4,minHeight:20}}></div>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontSize:13,fontWeight:700,color:"#d6d3cc"}}>{tipo}</span>
                        <span style={{background:cor+"22",color:cor,border:"1px solid "+cor+"44",borderRadius:4,fontSize:10,fontWeight:700,padding:"1px 7px"}}>{tipo}</span>
                        {i===0&&<span style={{background:"#3b82f622",color:"#5a7aaa",border:"1px solid #3b82f633",borderRadius:4,fontSize:10,fontWeight:700,padding:"1px 7px"}}>Recente</span>}
                      </div>
                      {m.nome&&<div style={{fontSize:12,color:"#8a8782",marginBottom:4,lineHeight:1.5}}>{m.nome}</div>}

                      {isIntim&&<div style={{background:"#ef444408",border:"1px solid #ef444433",borderRadius:6,padding:"6px 10px",marginTop:8,fontSize:11,color:"#b46464",fontWeight:600}}>Intimacao detectada — verifique o prazo e crie uma diligencia</div>}

const ESTAGIOS_JUD=[
  {k:"protocolado",l:"Protocolado",desc:"Processo protocolado junto ao Poder Judiciário e distribuído à vara competente."},
  {k:"audiencia_conciliacao",l:"Audiência de Conciliação",desc:"Audiência de conciliação entre as partes designada pelo juízo."},
  {k:"tramitacao",l:"Em Tramitação",desc:"Processo em andamento perante o Judiciário. Aguardando movimentações processuais."},
  {k:"audiencia_instrucao",l:"Audiência de Instrução e Julgamento",desc:"Audiência de instrução e julgamento designada pelo juízo."},
  {k:"sentenca",l:"Sentença",desc:"Decisão final do juiz sobre o processo."},
];
const ESTAGIOS_ADM=[
  {k:"iniciado",l:"Iniciado",desc:"Processo iniciado e documentação recebida."},
  {k:"diligencias",l:"Diligências Internas",desc:"Levantamento e organização da documentação necessária."},
  {k:"cartorio_notas",l:"Cartório de Notas",desc:"Processo em andamento no Cartório de Notas."},
  {k:"cartorio_registro",l:"Cartório de Registro",desc:"Registro no Cartório de Registro de Imóveis."},
  {k:"concluso",l:"Concluso",desc:"Processo finalizado e documentação entregue ao cliente."},
];

const AbaPortalCliente=({servico,cliente,atualizar,showToast})=>{
  const isJudicial=servico.tipoProcesso==="judicial";
  const estagios=isJudicial?ESTAGIOS_JUD:ESTAGIOS_ADM;
  const portal=servico.portal||{};
  const estagio_atual=portal.estagio_atual||estagios[0].k;
  const token=portal.token||(()=>{const t=Math.random().toString(36).slice(2,10).toUpperCase();return t;})();
  const link=window.location.origin+"/processo/"+token;
  const [copiado,setCopiado]=React.useState(false);

  const salvarEstagio=(k)=>{
    const datas=portal.datas||{};
    if(!datas[k])datas[k]=new Date().toISOString().slice(0,10);
    atualizar({portal:{...portal,estagio_atual:k,datas,token}});
    if(showToast)showToast("Estágio atualizado!");
  };

  const copiarLink=()=>{
    const fullLink="https://app.capacheco.adv.br/processo/"+token;
    if(navigator.clipboard){navigator.clipboard.writeText(fullLink);}
    setCopiado(true);setTimeout(()=>setCopiado(false),2500);
    if(!portal.token)atualizar({portal:{...portal,token,estagio_atual}});
  };

  const idx_atual=estagios.findIndex(e=>e.k===estagio_atual);
  const fmtDt=(d)=>{if(!d)return"";try{const p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}catch{return d;}};

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {/* Painel de controle */}
        <div style={S.card}>
          <div style={{...S.cardTitle,marginBottom:14}}>Atualizar estágio do processo</div>
          <div style={{fontSize:11,color:"#4a4d56",marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>Clique para avançar:</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:18}}>

const AbaContratos=({servico,cliente,atualizar,showToast})=>{
  const eh=cliente||{};
  const isJudicial=servico.tipoProcesso==="judicial";
  const conj=eh.conjugeNome&&(eh.estadoCivil==="Casado(a)"||eh.estadoCivil==="União Estável");
  const historico=servico.historicoContratos||[];
  const [modalDoc,setModalDoc]=useState(null);
  const [campos,setCampos]=useState({objeto:"",parcelas:"",objDesc:""});

  const registrar=(tipo)=>{
    const novo={id:Date.now(),tipo,data:new Date().toISOString().slice(0,10),hora:new Date().toTimeString().slice(0,5)};
    atualizar({historicoContratos:[...historico,novo]});
    if(showToast)showToast(tipo+" gerado!");
  };

  const abrirModal=(tipo)=>{
    setCampos({objeto:"",parcelas:"",objDesc:""});
    setModalDoc(tipo);
  };

  const gerarDoc=()=>{
    const sv={...servico,_objeto:campos.objeto,_parcelas:campos.parcelas,_objDesc:campos.objDesc};
    if(modalDoc==="contrato_judicial"){gerarContratoJudicial(sv,cliente);registrar("Contrato de Honorários Advocatícios");}
    else if(modalDoc==="proc_judicial"){gerarProcuracaoJudicial(sv,cliente);registrar("Procuração Ad Judicia");}
    else if(modalDoc==="contrato_extra"){gerarContratoExtrajudicial(sv,cliente);registrar("Contrato de Despachante Imobiliário");}
    else if(modalDoc==="proc_extra"){gerarProcuracaoExtrajudicial(sv,cliente);registrar("Procuração Ad Negotia");}
    setModalDoc(null);
  };

  const docs=isJudicial?[
    {id:"contrato_judicial",tipo:"Contrato de Honorários Advocatícios",icon:"◈"},
    {id:"proc_judicial",tipo:"Procuração Ad Judicia",icon:"◎"},
  ]:[
    {id:"contrato_extra",tipo:"Contrato de Despachante Imobiliário",icon:"◈"},
    {id:"proc_extra",tipo:"Procuração Ad Negotia",icon:"◎"},
  ];

  const precisaObjeto=modalDoc==="contrato_judicial"||modalDoc==="proc_judicial";
  const precisaParcelas=modalDoc==="contrato_judicial"||modalDoc==="contrato_extra";
  const precisaObjDesc=modalDoc==="contrato_extra"||modalDoc==="proc_extra";

  return(
    <div>
      {/* Banner tipo */}
      <div style={{background:isJudicial?"#ef444408":"#3b82f608",border:"1px solid "+(isJudicial?"#ef444422":"#3b82f622"),borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:16}}>{isJudicial?"⚖":"◈"}</span>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:isJudicial?"#b46464":"#5a7aaa"}}>Modelos {isJudicial?"Judiciais":"Extrajudiciais"} disponíveis</div>
          <div style={{fontSize:11,color:"#4a4d56",marginTop:2}}>Dados do cliente preenchidos automaticamente</div>
        </div>
      </div>
      {!eh.profissao&&<div style={{background:"#f59e0b0d",border:"1px solid #f59e0b33",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#a87840"}}>⚠ Campos complementares do cliente (profissão, naturalidade, filiação) não preenchidos. Complete o cadastro para documentos mais completos.</div>}
      {conj&&<div style={{background:"#3b82f60a",border:"1px solid #3b82f622",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#5a7aaa"}}>Cônjuge identificado: <strong style={{color:"#d6d3cc"}}>{eh.conjugeNome}</strong> — constará nos documentos</div>}

      {/* Cards dos documentos */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
        {docs.map(d=>(
          <div key={d.tipo} style={{...S.card,textAlign:"center",padding:20}}>
            <div style={{fontSize:28,marginBottom:10,color:"#5a7aaa"}}>{d.icon}</div>
            <div style={{fontSize:13,fontWeight:700,color:"#d6d3cc",marginBottom:6}}>{d.tipo}</div>
            <div style={{fontSize:11,color:"#4a4d56",marginBottom:14}}>Clique para preencher e gerar</div>
            <button style={{...S.btnPrimary,width:"100%"}} onClick={()=>abrirModal(d.id)} className="bp">Gerar documento</button>
          </div>
        ))}
      </div>

      {/* Histórico */}
      {historico.length>0&&(
        <div style={S.card}>
          <div style={{...S.cardTitle,marginBottom:10}}>Documentos gerados</div>
          {historico.slice().reverse().map(h=>(
            <div key={h.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #0f1f35"}}>
              <span style={{fontSize:14,color:"#5a7aaa"}}>◎</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:"#d6d3cc"}}>{h.tipo}</div>
                <div style={{fontSize:11,color:"#4a4d56"}}>{fmtData(h.data)} às {h.hora}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Modal de preenchimento */}
      {modalDoc&&(
        <div style={S.overlay} onClick={()=>setModalDoc(null)}>
          <div style={{...S.modal,maxWidth:520}} onClick={e=>e.stopPropagation()}>
            <div style={{...S.modalHeader}}>
              <div style={S.modalTitle}>Preencher antes de gerar</div>
              <button style={S.modalClose} onClick={()=>setModalDoc(null)}>×</button>
            </div>
            <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>
              {precisaObjeto&&(
                <div>
                  <label style={{...S.label}}>Objeto do serviço (Cláusula 1ª) *</label>
                  <textarea style={{...S.fi,minHeight:80,resize:"vertical"}} placeholder={"Ex: ação de Usucapião judicial da área de terra situado no lugar denominado antiga Fazenda Boca da Onça, até a última instância dos Órgãos do Poder Judiciário Estaduais, e o registro da respectiva sentença quando proferida."} value={campos.objeto} onChange={e=>setCampos({...campos,objeto:e.target.value})}/>
                  <div style={{fontSize:10,color:"#4a4d56",marginTop:4}}>Este texto ficará sublinhado na Cláusula 1ª — descreva o serviço completo.</div>
                </div>
              )}
              {precisaObjDesc&&(
                <div>
                  <label style={{...S.label}}>Objeto do serviço (Cláusula 1ª) *</label>
                  <textarea style={{...S.fi,minHeight:80,resize:"vertical"}} placeholder={"Ex: A transferência de titularidade do imóvel de matrícula n. 11.789, serviços: Cadastro junto a Prefeitura, acompanhamento da escritura e registro."} value={campos.objDesc} onChange={e=>setCampos({...campos,objDesc:e.target.value})}/>
                </div>
              )}
              {precisaParcelas&&(
                <div>
                  <label style={{...S.label}}>Valor e forma de pagamento (Cláusula 2ª / 4ª) *</label>
                  <textarea style={{...S.fi,minHeight:80,resize:"vertical"}} placeholder={"Ex: R$ 15.000,00 (quinze mil reais), sendo: R$ 5.000,00 em 07/04/2026, R$ 3.333,33 em 07/06/2026, R$ 3.333,33 em 07/09/2026 e R$ 3.333,33 em 07/12/2026."} value={campos.parcelas} onChange={e=>setCampos({...campos,parcelas:e.target.value})}/>
                </div>
              )}
            </div>
            <div style={{...S.modalFooter}}>
              <button style={S.btnSec} onClick={()=>setModalDoc(null)} className="bs">Cancelar</button>
              <button style={S.btnPrimary} onClick={gerarDoc} className="bp">Gerar e Imprimir</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};







// Funções de impressão
const _t=(c,s,v)=>"<"+c+(s?" style='"+s+"'":"")+">"+v+"</"+c+">";
const _tr=(cells,s)=>"<tr"+(s?" style='"+s+"'":"")+">"+cells+"</tr>";
const _th=(v)=>"<th style='background:#1e293b;color:#fff;padding:7px 10px;text-align:left;font-size:11px'>"+v+"</th>";
const _td=(v,s)=>"<td"+(s?" style='"+s+"'":"")+">"+v+"</td>";
const _tbl=(rows)=>"<table style='width:100%;border-collapse:collapse;font-size:11px'>"+rows+"</table>";
const _css="body{font-family:Arial,sans-serif;padding:28px;}h1{font-size:16px;border-bottom:2px solid #1e293b;padding-bottom:8px;}h2,h3{font-size:12px;color:#475569;text-transform:uppercase;margin:14px 0 6px;}table{width:100%;border-collapse:collapse;font-size:11px;}th{background:#1e293b;color:#fff;padding:7px 10px;text-align:left;}td{padding:6px 10px;border-bottom:1px solid #eee;}tr:nth-child(even) td{background:#f9f9f9;}.tot td{background:#f0f0f0!important;font-weight:800;}@media print{button{display:none;}}";
const _abrir=(titulo,corpo)=>{const w=window.open("","_blank");w.document.write("<!DOCTYPE html><html><head><meta charset=UTF-8><title>"+titulo+"</title><style>"+_css+"</style></head><body>"+corpo+"<br><button onclick=window.print() style=background:#1e293b;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer>Imprimir PDF</button></body></html>");w.document.close();};
const fmtR=(v)=>Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});

const imprimirJudicial=(filtrados,cn)=>{
  const thead=_tr(["Protocolo","Cliente","N Processo","Demanda","Vara","Comarca","Estagio"].map(_th).join(""));
  const rows=filtrados.map(s=>_tr([_td(s.protocolo),_td(cn(s.clienteId||s.cliente_id)),_td(s.dadosJudiciais&&s.dadosJudiciais.numero||"-"),_td(s.dadosJudiciais&&s.dadosJudiciais.tipoDemanda||"-"),_td(s.dadosJudiciais&&s.dadosJudiciais.vara||"-"),_td(s.dadosJudiciais&&s.dadosJudiciais.comarca||"-"),_td(s.estagio)].join(""))).join("");
  const corpo=_t("h1","","Processos Judiciais")+_t("p","color:#666;font-size:11px",new Date().toLocaleDateString("pt-BR")+" - "+filtrados.length+" processo(s)")+_tbl(thead+rows);
  _abrir("Processos Judiciais",corpo);
};

const imprimirExtrato=(recF,pagF,totRF,totPF,dtIni,dtFim,anoFin)=>{
  const per=dtIni||dtFim?(dtIni||"inicio")+" a "+(dtFim||"hoje"):"Ano "+anoFin;
  const thR=_tr(["Data","Descricao","Cliente","Forma","Valor"].map(_th).join(""));
  const thP=_tr(["Data","Descricao","Categoria","Forma","Valor"].map(_th).join(""));
  const rowsR=recF.sort((a,b)=>b.data.localeCompare(a.data)).map(r=>_tr([_td(r.data),_td(r.descricao),_td(r.cliente||"-"),_td(r.forma||"-"),_td("R$ "+fmtR(r.valor),"color:#16a34a;font-weight:700")].join(""))).join("");
  const rowsP=pagF.sort((a,b)=>b.data.localeCompare(a.data)).map(p=>_tr([_td(p.data),_td(p.descricao),_td(p.categoria||"-"),_td(p.forma||"-"),_td("R$ "+fmtR(p.valor),"color:#dc2626;font-weight:700")].join(""))).join("");
  const tfR=_tr([_td("TOTAL","font-weight:800",),_td("",""),_td("",""),_td("",""),_td("R$ "+fmtR(totRF),"color:#16a34a;font-weight:800")].join(""),"background:#f0f0f0");
  const tfP=_tr([_td("TOTAL","font-weight:800"),_td("",""),_td("",""),_td("",""),_td("R$ "+fmtR(totPF),"color:#dc2626;font-weight:800")].join(""),"background:#f0f0f0");
  const luc=totRF-totPF;
  const corpo=_t("h1","","Extrato Financeiro - "+per)+_t("h3","","Recebimentos ("+recF.length+")")+_tbl(thR+rowsR+tfR)+_t("h3","","Pagamentos ("+pagF.length+")")+_tbl(thP+rowsP+tfP)+_t("h3","","Resultado: R$ "+fmtR(luc));
  _abrir("Extrato",corpo);
};

const imprimirRelatorio=(dadosMensais,totRec,totPag,lucro,tR,tP,luc,dtIni,dtFim,anoFin)=>{
  const per=dtIni||dtFim?(dtIni||"inicio")+" a "+(dtFim||"hoje"):"Ano "+anoFin;
  const thMes=_tr(["Mes","Recebido","Pago","Resultado","Margem"].map(_th).join(""));
  const rows=dadosMensais.map(m=>_tr([_td(m.mes),_td("R$ "+fmtR(m.recebido),"color:#16a34a;font-weight:700"),_td("R$ "+fmtR(m.pago),"color:#dc2626;font-weight:700"),_td("R$ "+fmtR(m.lucro),(m.lucro>=0?"color:#16a34a":"color:#dc2626")+";font-weight:700"),_td(m.recebido>0?((m.lucro/m.recebido)*100).toFixed(1)+"%":"-")].join(""))).join("");
  const tf=_tr([_td("TOTAL","font-weight:800"),_td("R$ "+fmtR(totRec),"color:#16a34a;font-weight:800"),_td("R$ "+fmtR(totPag),"color:#dc2626;font-weight:800"),_td("R$ "+fmtR(lucro),(lucro>=0?"color:#16a34a":"color:#dc2626")+";font-weight:800"),_td(totRec>0?((lucro/totRec)*100).toFixed(1)+"%":"-")].join(""),"background:#f0f0f0");
  const thRes=_tr([_th("Indicador"),_th("Valor")].join(""));
  const resRows=_tr([_td("Total recebido"),_td("R$ "+fmtR(tR),"color:#16a34a;font-weight:700")].join(""))+_tr([_td("Total pago"),_td("R$ "+fmtR(tP),"color:#dc2626;font-weight:700")].join(""))+_tr([_td("Resultado","font-weight:800"),_td("R$ "+fmtR(luc),(luc>=0?"color:#16a34a":"color:#dc2626")+";font-weight:800")].join(""),"background:#f0f0f0");
  const corpo=_t("h1","","Relatorio Gerencial - "+per)+_t("h3","","Resumo")+_tbl(thRes+resRows)+_t("h3","","Movimento mensal")+_tbl(thMes+rows+tf);
  _abrir("Relatorio",corpo);
};

const imprimirLeads=(filtrados)=>{

const imprimirCustos=(ML,vals,funcs,outros,custoMes,ano)=>{
  const k=(i)=>ano+"-"+String(i+1).padStart(2,"0");
  const fC=(v)=>Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});
  const fR=(v)=>v>0?"R$ "+fC(v):"-";
  const colsFixas=[{id:"aluguel",nome:"Aluguel"},{id:"energia",nome:"Energia"},{id:"iptu",nome:"IPTU"},{id:"agua",nome:"Agua"},{id:"condominio",nome:"Condominio"},{id:"contabilidade",nome:"Contabilidade"},{id:"impostos",nome:"Impostos"}].filter(c=>Object.values(vals[c.id]||{}).some(v=>Number(v)>0));
  const colsOutros=outros.filter(o=>Object.values(o.v||{}).some(v=>Number(v)>0)).map(o=>({id:o.id,nome:o.nome,v:o.v}));
  const salMes=funcs.reduce((a,f)=>{const s=Number(f.salario||0);return a+s+s/12+s/3/12+Number(f.enc||0);},0);
  const allCols=[...colsFixas,...colsOutros,...(salMes>0?[{id:"_pessoal",nome:"Pessoal"}]:[])];
  const totCols={};allCols.forEach(c=>{totCols[c.id]=0;});
  let totalAno=0;
  const thead=_tr(["Mes",...allCols.map(c=>c.nome),"Total"].map(_th).join(""));
  let rows="";
  ML.forEach((m,i)=>{
    let totMes=0;
    const cels=allCols.map(c=>{
      let v=0;
      if(c.id==="_pessoal")v=salMes;
      else if(c.v)v=Number(c.v[k(i)]||0);
      else v=Number((vals[c.id]||{})[k(i)]||0);
      totCols[c.id]=(totCols[c.id]||0)+v;
      totMes+=v;
      return _td(fR(v));
    });
    totalAno+=totMes;
    rows+=_tr([_td("<b>"+m+"</b>"),...cels,_td(totMes>0?"<b>R$ "+fC(totMes)+"</b>":"-","color:#dc2626;font-weight:800")].join(""));
  });
  const tfCels=allCols.map(c=>_td("<b>R$ "+fC(totCols[c.id])+"</b>","color:#1d4ed8;font-weight:800"));
  const tf=_tr([_td("<b>TOTAL</b>","font-weight:800;background:#f1f5f9"),...tfCels,_td("<b>R$ "+fC(totalAno)+"</b>","color:#dc2626;font-weight:800;background:#f1f5f9")].join(""));
  const pessoalStr=funcs.length>0?_t("p","font-size:12px;margin:8px 0","<b>Funcionarios:</b> "+funcs.map(f=>f.nome+" (R$ "+fC(Number(f.salario||0))+")").join(", ")):"";
  const corpo=_t("h1","","Relatorio de Custos - "+ano)+_t("p","color:#666;font-size:11px","Emitido em "+new Date().toLocaleDateString("pt-BR"))+pessoalStr+_tbl(thead+rows+tf);
  _abrir("Custos "+ano,corpo);
};
const TelaJudicial=({servicos,setServicos,clientes,cn,irPara,sb,showToast,abrirServico})=>{
  const [busca,setBusca]=useState("");
  const [filtroStatus,setFiltroStatus]=useState("Todos");
  const processos=servicos.filter(s=>s.tipoProcesso==="judicial"||s.tipo_processo==="judicial"||(s.dadosJudiciais&&Object.keys(s.dadosJudiciais||{}).length>0)||s.estagio==="Judiciário"||s.estagio==="Judicial");
  const filtrados=processos.filter(s=>{
    const q=busca.toLowerCase();
    const cli=clientes.find(c=>c.id===(s.clienteId||s.cliente_id));
    const mb=!q||(cli?.nome||"").toLowerCase().includes(q)||(s.dadosJudiciais?.numero||"").includes(q)||(s.protocolo||"").toLowerCase().includes(q);
    const ms=filtroStatus==="Todos"||s.status===filtroStatus;
    return mb&&ms;
  });

  const darBaixa=async(s)=>{
    if(!window.confirm("Dar baixa no processo de "+cn(s.clienteId||s.cliente_id)+"? Ele ficara como Concluido no sistema."))return;
    const portalAtual=s.portal||{};
    const estagioFinal=s.tipoProcesso==="judicial"?"sentenca":"concluso";
    const datasPortal=portalAtual.datas||{};
    if(!datasPortal[estagioFinal])datasPortal[estagioFinal]=new Date().toISOString().slice(0,10);
    const portalAtualizado=portalAtual.token?{...portalAtual,estagio_atual:estagioFinal,datas:datasPortal}:portalAtual;
    await sb.from("servicos").update({status:"Concluído",estagio:"Concluído",portal:portalAtualizado}).eq("id",s.id);
    setServicos(prev=>prev.map(x=>x.id===s.id?{...x,status:"Concluído",estagio:"Concluído",portal:portalAtualizado}:x));
    showToast("Processo concluido!");
  };

  return(
    <div style={S.tela}>
      <PageHeader title="Processos Judiciais" sub={filtrados.length+" processo(s)"}>
        <input style={{...S.search,width:280}} placeholder="Buscar por nome, numero do processo..." value={busca} onChange={e=>setBusca(e.target.value)}/>
        <select style={S.selectSm} value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)}>
          <option>Todos</option><option>Aberto</option><option value="Concluído">Concluido</option>
        </select>
        <button style={S.btnPrimary} onClick={()=>imprimirJudicial(filtrados,cn)} className="bp">Imprimir</button>
      </PageHeader>
      <div style={S.body}>
        {processos.length===0?(
          <div style={{...S.card,textAlign:"center",padding:"40px"}}>
            <div style={{fontSize:14,fontWeight:600,color:"#d6d3cc",marginBottom:8}}>Nenhum processo judicial cadastrado</div>
            <div style={{fontSize:13,color:"#4a4d56"}}>Ao cadastrar um servico, selecione "Judicial" para que apareca aqui.</div>
          </div>
        ):(
          <div style={S.tableCard}>
            <table style={S.table}>
              <thead><tr>{["Protocolo","Cliente","N Processo","Tipo de Demanda","Vara","Comarca","Estagio","Status","Acoes"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>{filtrados.map(s=>(
                <tr key={s.id} style={{...S.tr,opacity:s.status==="Concluído"?0.6:1}} className="tr">
                  <td style={S.td}><span style={S.proto}>{s.protocolo}</span></td>
                  <td style={S.td}><div style={{fontWeight:600,color:"#d6d3cc"}}>{cn(s.clienteId||s.cliente_id)}</div></td>
                  <td style={S.td}><span style={{fontFamily:"monospace",fontSize:11,color:"#8a8782"}}>{s.dadosJudiciais?.numero||"-"}</span></td>
                  <td style={S.td}>{s.dadosJudiciais?.tipoDemanda||"-"}</td>
                  <td style={S.td}>{s.dadosJudiciais?.vara||"-"}</td>
                  <td style={S.td}>{s.dadosJudiciais?.comarca||"-"}</td>
                  <td style={S.td}><Tag label={s.estagio} color={ECOR[s.estagio]||"#5a5d66"}/></td>
                  <td style={S.td}><Tag label={s.status} color={s.status==="Concluído"?"#5a8f6e":"#5a7aaa"}/></td>
                  <td style={S.td}>
                    <button style={S.btnSm} onClick={()=>{if(abrirServico)abrirServico(s);else irPara("servicos");}} className="bs">Ver</button>
                    {s.status!=="Concluído"?(
                      <button style={{...S.btnSm,color:"#5a8f6e",borderColor:"#22c55e33"}} onClick={()=>darBaixa(s)} className="bs">Dar Baixa</button>
                    ):(
                      <span style={{fontSize:11,color:"#5a8f6e",fontWeight:600}}>✓ Concluido</span>
                    )}
                  </td>
                </tr>
              ))}</tbody>
            </table>
            {filtrados.length===0&&<div style={S.empty}>Nenhum resultado.</div>}
          </div>
        )}
      </div>
    </div>
  );
};

const TelaDiligencias=({servicos,cn,abrirServico})=>{
  const [busca,setBusca]=useState("");
  const [filtroStatus,setFiltroStatus]=useState("todos");
  const [filtroOrgao,setFiltroOrgao]=useState("");
  const hoje=new Date();
  const ddiff=(p)=>{if(!p)return 99;const hj=new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate());const pr=new Date(p+"T12:00:00");return Math.round((pr-hj)/(864e5));};
  const getStatus=(d)=>{
    if(d.status==="Concluída")return"concluida";
    if(!d.prazo)return"proxima";
    const diff=ddiff(d.prazo);
    if(diff<0)return"vencida";
    if(diff===0)return"hoje";
    if(diff===1)return"amanha";
    return"proxima";
  };
  const STATUS_INFO={
    vencida:{l:"Vencida",c:"#b46464"},
    hoje:{l:"Hoje",c:"#a06832"},
    amanha:{l:"Amanhã",c:"#eab308"},
    proxima:{l:"Próxima",c:"#5a7aaa"},
    concluida:{l:"Concluída",c:"#5a8f6e"},
  };
  const todasDilig=servicos.flatMap(s=>(s.diligencias||[]).map(d=>({
    ...d,
    clienteNome:cn(s.clienteId||s.cliente_id),
    servicoId:s.id,
    protocolo:s.protocolo,
    servicoTipo:s.tipo,
    servicoObj:s,
    statusCalc:getStatus(d),
  })));
  const orgaosUnicos=[...new Set(todasDilig.map(d=>d.orgao).filter(Boolean))].sort();
  const filtradas=todasDilig.filter(d=>{
    const q=busca.toLowerCase();
    const matchBusca=!busca||d.descricao?.toLowerCase().includes(q)||d.clienteNome?.toLowerCase().includes(q)||d.protocolo?.toLowerCase().includes(q)||d.orgao?.toLowerCase().includes(q);
    const matchStatus=filtroStatus==="todos"||d.statusCalc===filtroStatus;
    const matchOrgao=!filtroOrgao||d.orgao===filtroOrgao;
    return matchBusca&&matchStatus&&matchOrgao;
  }).sort((a,b)=>{
    const ordem={vencida:0,hoje:1,amanha:2,proxima:3,concluida:4};
    return (ordem[a.statusCalc]||3)-(ordem[b.statusCalc]||3)||(a.prazo||"").localeCompare(b.prazo||"");
  });
  const contadores={
    vencida:todasDilig.filter(d=>d.statusCalc==="vencida").length,
    hoje:todasDilig.filter(d=>d.statusCalc==="hoje").length,
    amanha:todasDilig.filter(d=>d.statusCalc==="amanha").length,
    proxima:todasDilig.filter(d=>d.statusCalc==="proxima").length,
    concluida:todasDilig.filter(d=>d.statusCalc==="concluida").length,
  };
  return(
    <div style={S.tela}>
      <PageHeader title="Diligências" sub={todasDilig.length+" no total · "+filtradas.length+" exibidas"}>
        <input style={S.search} placeholder="Buscar por descrição, cliente, órgão..." value={busca} onChange={e=>setBusca(e.target.value)}/>
      </PageHeader>
      <div style={S.body}>
        {/* Contadores */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {[["todos","Todos",todasDilig.length,"#5a5d66"],["vencida","Vencidas",contadores.vencida,"#b46464"],["hoje","Hoje",contadores.hoje,"#a06832"],["amanha","Amanhã",contadores.amanha,"#eab308"],["proxima","Próximas",contadores.proxima,"#5a7aaa"],["concluida","Concluídas",contadores.concluida,"#5a8f6e"]].map(([k,l,n,c])=>(
            <button key={k} onClick={()=>setFiltroStatus(k)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid "+(filtroStatus===k?c+"66":"#2a2d36"),background:filtroStatus===k?c+"22":"#1a1d24",color:filtroStatus===k?c:"#5a5d66",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}} className="bs">
              {l} <span style={{background:filtroStatus===k?c+"33":"#2a2d36",borderRadius:999,padding:"1px 7px",fontSize:11}}>{n}</span>
            </button>
          ))}
          {orgaosUnicos.length>0&&(
            <select style={{...S.fi,width:"auto",fontSize:12,padding:"6px 12px"}} value={filtroOrgao} onChange={e=>setFiltroOrgao(e.target.value)}>
              <option value="">Todos os órgãos</option>
              {orgaosUnicos.map(o=><option key={o}>{o}</option>)}
            </select>
          )}
        </div>
        {/* Lista */}
        {filtradas.length===0&&<div style={S.empty}>Nenhuma diligência encontrada com os filtros selecionados.</div>}
        <div style={S.tableCard}>
          <table style={S.table}>
            <thead>
              <tr>{["Status","Descrição","Cliente / Protocolo","Órgão","Prazo","Responsável",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {filtradas.map(d=>{
                const si=STATUS_INFO[d.statusCalc]||STATUS_INFO.proxima;
                const venc=d.statusCalc==="vencida";
                const diff=d.prazo?ddiff(d.prazo):null;
                return(
                  <tr key={d.id} style={{...S.tr,background:venc?"#ef444408":"transparent"}} className="tr">
                    <td style={S.td}>
                      <span style={{background:si.c+"22",color:si.c,border:"1px solid "+si.c+"44",borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{si.l}</span>
                    </td>
                    <td style={{...S.td,maxWidth:220}}>
                      <div style={{fontWeight:600,color:"#d6d3cc",fontSize:12}}>{d.descricao}</div>
                      {d.ref&&<div style={{fontSize:11,color:"#4a4d56"}}>Ref: {d.ref}</div>}
                    </td>
                    <td style={S.td}>
                      <div style={{fontSize:12,fontWeight:600,color:"#d6d3cc"}}>{d.clienteNome}</div>
                      <div style={{fontSize:11,color:"#4a4d56"}}>{d.servicoTipo} · {d.protocolo}</div>
                    </td>
                    <td style={S.td}><span style={{fontSize:12,color:"#8a8782"}}>{d.orgao||"—"}</span></td>
                    <td style={S.td}>
                      {d.prazo?(
                        <div>
                          <div style={{fontSize:12,fontWeight:700,color:si.c}}>{d.prazo}</div>
                          <div style={{fontSize:11,color:si.c}}>{diff===null?"":diff<0?diff+"d":diff===0?"hoje":"+"+diff+"d"}</div>
                        </div>
                      ):<span style={{color:"#4a4d56",fontSize:12}}>—</span>}
                    </td>
                    <td style={S.td}><span style={{fontSize:12,color:"#8a8782"}}>{d.responsavel||"—"}</span></td>
                    <td style={S.td}>
                      <button style={{...S.btnSm,color:"#5a7aaa",borderColor:"#3b82f644",whiteSpace:"nowrap"}} onClick={()=>abrirServico&&abrirServico(d.servicoObj)} className="bs">Abrir →</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

const TelaAgenda=({agenda,setAgenda,clientes,servicos,cn,sb,showToast})=>{
  const [form,setForm]=useState({titulo:"",tipo:"atendimento",data:td(),hora:"",cliente_id:"",servico_id:"",obs:"",recorrencia:"nao_repete",recorrencia_fim:""});
  const [editando,setEditando]=useState(null);
  const [filtro,setFiltro]=useState("pendente");
  const [busca,setBusca]=useState("");

  const tipos=[
    {k:"atendimento",l:"Atendimento",c:"#5a7aaa"},
    {k:"audiencia",l:"Audiência",c:"#7a6aaa"},
    {k:"diligencia",l:"Diligência",c:"#a87840"},
    {k:"prazo",l:"Prazo",c:"#b46464"},
    {k:"outro",l:"Outro",c:"#5a5d66"},
  ];

  const corTipo=(t)=>tipos.find(x=>x.k===t)?.c||"#5a5d66";

  const gerarDatas=(dataInicio,recorrencia,dataFim)=>{
    const datas=[];
    const d=new Date(dataInicio+"T12:00:00");
    const fim=dataFim?new Date(dataFim+"T12:00:00"):null;
    const max=fim?null:52;
    let count=0;
    while(true){
      const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
      if(fim&&d>fim)break;
      if(max&&count>=max)break;
      datas.push(ds);
      count++;
      if(recorrencia==="diario")d.setDate(d.getDate()+1);
      else if(recorrencia==="semanal")d.setDate(d.getDate()+7);
      else if(recorrencia==="quinzenal")d.setDate(d.getDate()+14);
      else if(recorrencia==="mensal")d.setMonth(d.getMonth()+1);
      else if(recorrencia==="anual")d.setFullYear(d.getFullYear()+1);
      else break;
    }
    return datas;
  };

  // Modal editar recorrente
  const [modalRecorr,setModalRecorr]=useState(null); // {tipo:"edit"|"delete", evento}
  const [opcaoRecorr,setOpcaoRecorr]=useState("este"); // "este" | "este_seguintes" | "todos"

  const salvar=async()=>{
    if(!form.titulo.trim()){showToast("Informe o titulo.","erro");return;}
    if(!form.data){showToast("Informe a data.","erro");return;}
    const recId=form.recorrencia&&form.recorrencia!=="nao_repete"?(Date.now().toString(36)+Math.random().toString(36).slice(2)):null;
    const payload={
      titulo:form.titulo,
      tipo:form.tipo||"atendimento",
      data:form.data,
      hora:form.hora||null,
      cliente_id:form.cliente_id||null,
      servico_id:form.servico_id||null,
      obs:form.obs||null,
      status:"pendente",
      recorrencia:form.recorrencia||"nao_repete",
      recorrencia_id:null
    };
    try{
      if(editando){
        const ev=agenda.find(a=>a.id===editando);
        const temSerie=ev&&ev.recorrencia_id;
        if(temSerie){
          setModalRecorr({tipo:"edit",evento:ev,payload});
          return;
        }
        const{error}=await sb.from("agenda").update(payload).eq("id",editando);
        if(error){showToast("Erro: "+error.message,"erro");return;}
        setAgenda(prev=>prev.map(a=>a.id===editando?{...a,...payload}:a));
        showToast("Agendamento atualizado!");
      }else if(form.recorrencia&&form.recorrencia!=="nao_repete"){
        const datas=gerarDatas(form.data,form.recorrencia,form.recorrencia_fim);
        const payloads=datas.map((dt,idx)=>({...payload,data:dt,recorrencia_id:recId,recorrencia_ordem:idx}));
        const{data,error}=await sb.from("agenda").insert(payloads).select();
        if(error){showToast("Erro: "+error.message,"erro");return;}
        if(data)setAgenda(prev=>[...prev,...data]);
        showToast(datas.length+" agendamentos criados!");
      }else{
        const{data,error}=await sb.from("agenda").insert(payload).select().single();
        if(error){showToast("Erro: "+error.message,"erro");return;}
        if(data)setAgenda(prev=>[...prev,data]);
        showToast("Agendamento criado!");
      }
      setForm({titulo:"",tipo:"atendimento",data:td(),hora:"",cliente_id:"",servico_id:"",obs:"",recorrencia:"nao_repete",recorrencia_fim:"",_buscaCli:""});
      setEditando(null);
    }catch(e){showToast("Erro ao salvar: "+e.message,"erro");}
  };

  const confirmarEdicaoRecorr=async()=>{
    const{evento,payload}=modalRecorr;
    const rid=evento.recorrencia_id;
    const rOrdem=evento.recorrencia_ordem||0;
    try{
      if(opcaoRecorr==="este"){
        await sb.from("agenda").update({...payload,recorrencia_id:rid}).eq("id",evento.id);
        setAgenda(prev=>prev.map(a=>a.id===evento.id?{...a,...payload}:a));
        showToast("Este evento atualizado!");
      }else if(opcaoRecorr==="este_seguintes"){
        // Atualizar este e todos com ordem >= atual
        const ids=agenda.filter(a=>a.recorrencia_id===rid&&(a.recorrencia_ordem||0)>=rOrdem).map(a=>a.id);
        for(const id of ids){
          await sb.from("agenda").update({...payload,recorrencia_id:rid}).eq("id",id);
        }
        setAgenda(prev=>prev.map(a=>ids.includes(a.id)?{...a,...payload}:a));
        showToast(ids.length+" eventos atualizados!");
      }else{
        // Todos
        const ids=agenda.filter(a=>a.recorrencia_id===rid).map(a=>a.id);
        for(const id of ids){
          await sb.from("agenda").update({...payload,recorrencia_id:rid}).eq("id",id);
        }
        setAgenda(prev=>prev.map(a=>ids.includes(a.id)?{...a,...payload}:a));
        showToast(ids.length+" eventos atualizados!");
      }
    }catch(e){showToast("Erro: "+e.message,"erro");}
    setModalRecorr(null);
    setForm({titulo:"",tipo:"atendimento",data:td(),hora:"",cliente_id:"",servico_id:"",obs:"",recorrencia:"nao_repete",recorrencia_fim:"",_buscaCli:""});
    setEditando(null);
  };

  const marcarRealizado=async(id)=>{
    await sb.from("agenda").update({status:"realizado"}).eq("id",id);
    setAgenda(prev=>prev.map(a=>a.id===id?{...a,status:"realizado"}:a));
    showToast("Marcado como realizado!");
  };

  const excluir=async(id)=>{
    const ev=agenda.find(a=>a.id===id);
    if(ev&&ev.recorrencia_id){
      setModalRecorr({tipo:"delete",evento:ev});
      return;
    }
    if(!window.confirm("Excluir este agendamento?"))return;
    await sb.from("agenda").delete().eq("id",id);
    setAgenda(prev=>prev.filter(a=>a.id!==id));
    showToast("Agendamento excluído.");
  };

  const confirmarExclusaoRecorr=async()=>{
    const{evento}=modalRecorr;
    const rid=evento.recorrencia_id;
    const rOrdem=evento.recorrencia_ordem||0;
    try{
      if(opcaoRecorr==="este"){
        await sb.from("agenda").delete().eq("id",evento.id);
        setAgenda(prev=>prev.filter(a=>a.id!==evento.id));
        showToast("Evento excluído.");
      }else if(opcaoRecorr==="este_seguintes"){
        const ids=agenda.filter(a=>a.recorrencia_id===rid&&(a.recorrencia_ordem||0)>=rOrdem).map(a=>a.id);
        for(const id of ids) await sb.from("agenda").delete().eq("id",id);
        setAgenda(prev=>prev.filter(a=>!ids.includes(a.id)));
        showToast(ids.length+" eventos excluídos.");
      }else{
        const ids=agenda.filter(a=>a.recorrencia_id===rid).map(a=>a.id);
        for(const id of ids) await sb.from("agenda").delete().eq("id",id);
        setAgenda(prev=>prev.filter(a=>!ids.includes(a.id)));
        showToast(ids.length+" eventos excluídos.");
      }
    }catch(e){showToast("Erro: "+e.message,"erro");}
    setModalRecorr(null);
  };

  const filtrados=agenda.filter(a=>{
    const matchFiltro=filtro==="todos"||a.status===filtro;
    const matchBusca=!busca||a.titulo?.toLowerCase().includes(busca.toLowerCase())||cn(a.cliente_id).toLowerCase().includes(busca.toLowerCase());
    return matchFiltro&&matchBusca;
  }).sort((a,b)=>a.data.localeCompare(b.data)||(a.hora||"").localeCompare(b.hora||""));

  const hoje=td();
  const vencidos=agenda.filter(a=>a.status==="pendente"&&a.data<hoje).length;
  const deHoje=agenda.filter(a=>a.status==="pendente"&&a.data===hoje).length;

  return(
    <div style={S.tela}>
      <PageHeader title="Agenda" sub={agenda.length+" agendamento(s)"}/>
      <div style={S.body}>
        {(vencidos>0||deHoje>0)&&(
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            {vencidos>0&&<div style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:8,padding:"10px 14px",flex:1}}>
              <div style={{fontWeight:700,color:"#b46464",fontSize:12}}>VENCIDOS: {vencidos} agendamento(s) em atraso</div>
            </div>}
            {deHoje>0&&<div style={{background:"#f59e0b11",border:"1px solid #f59e0b33",borderRadius:8,padding:"10px 14px",flex:1}}>
              <div style={{fontWeight:700,color:"#a87840",fontSize:12}}>HOJE: {deHoje} agendamento(s)</div>
            </div>}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr",gap:16}}>
          <div style={S.card}>
            <div style={S.cardTitle}>{editando?"Editar Agendamento":"Novo Agendamento"}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <FI l="Título *" v={form.titulo} set={v=>setForm(f=>({...f,titulo:v}))} ph="Ex: Audiência João Silva"/>
              <div><FL l="Tipo"/>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {tipos.map(t=>(
                    <button key={t.k} onClick={()=>setForm(f=>({...f,tipo:t.k}))} style={{...S.btnSm,flex:1,...(form.tipo===t.k?{background:t.c+"22",color:t.c,borderColor:t.c}:{})}} className="bs">{t.l}</button>
                  ))}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <FI l="Data *" v={form.data} set={v=>setForm(f=>({...f,data:v}))} type="date"/>
                <FI l="Hora" v={form.hora} set={v=>setForm(f=>({...f,hora:v}))} type="time"/>
              </div>
              <div>
                <FL l="Cliente"/>
                <input
                  style={{...S.fi,marginBottom:4}}
                  placeholder="Digite nome ou CPF para buscar..."
                  value={form._buscaCli||""}
                  onChange={e=>setForm(f=>({...f,_buscaCli:e.target.value}))}
                />
                {form._buscaCli&&(
                  <div style={{border:"1px solid #1e3a5f",borderRadius:8,background:"#2a2d36",maxHeight:180,overflowY:"auto",marginBottom:4}}>
                    {[...clientes].filter(c=>{
                      const q=(form._buscaCli||"").toLowerCase();
                      return (c.nome||"").toLowerCase().includes(q)||(c.cpf||"").includes(q)||(c.cnpj||"").includes(q);
                    }).sort((a,b)=>(a.nome||"").localeCompare(b.nome||"")).slice(0,8).map(c=>(
                      <div key={c.id} style={{padding:"8px 12px",cursor:"pointer",borderBottom:"1px solid #1e3a5f",fontSize:13}} className="tr"
                        onClick={()=>setForm(f=>({...f,cliente_id:c.id,servico_id:"",_buscaCli:""}))}>
                        <div style={{fontWeight:600,color:"#d6d3cc"}}>{c.nome}</div>
                        <div style={{fontSize:11,color:"#4a4d56"}}>{c.cpf||c.cnpj||""}</div>
                      </div>
                    ))}
                    {[...clientes].filter(c=>{const q=(form._buscaCli||"").toLowerCase();return (c.nome||"").toLowerCase().includes(q)||(c.cpf||"").includes(q);}).length===0&&(
                      <div style={{padding:"10px 12px",color:"#4a4d56",fontSize:13}}>Nenhum cliente encontrado.</div>
                    )}
                  </div>
                )}
                <div style={{...S.fi,display:"flex",alignItems:"center",justifyContent:"space-between",background:form.cliente_id?"#22c55e0d":"#22252e",cursor:"pointer"}} onClick={()=>setForm(f=>({...f,_buscaCli:" "}))}>
                  {form.cliente_id?(
                    <span style={{color:"#5a8f6e",fontWeight:600,fontSize:13}}>{(clientes.find(c=>c.id===form.cliente_id)||{}).nome||"Cliente selecionado"}</span>
                  ):(
                    <span style={{color:"#4a4d56",fontSize:12}}>Nenhum cliente selecionado</span>
                  )}
                  {form.cliente_id&&<button style={{background:"none",border:"none",color:"#b46464",cursor:"pointer",fontSize:11}} onClick={e=>{e.stopPropagation();setForm(f=>({...f,cliente_id:"",servico_id:"",_buscaCli:""}));}}>Limpar</button>}
                </div>
              </div>
              {form.cliente_id&&(
                <div><FL l="Serviço (opcional)"/>
                  <select style={S.fi} value={form.servico_id||""} onChange={e=>setForm(f=>({...f,servico_id:e.target.value}))}>
                    <option value="">Nenhum</option>
                    {servicos.filter(s=>s.clienteId===form.cliente_id).map(s=><option key={s.id} value={s.id}>{s.protocolo} - {s.tipo}</option>)}
                  </select>
                </div>
              )}
              <div><FL l="Observações"/>
                <textarea style={{...S.fi,minHeight:60,resize:"vertical"}} value={form.obs||""} onChange={e=>setForm(f=>({...f,obs:e.target.value}))} placeholder="Detalhes do agendamento..."/>
              </div>
              {!editando&&(
                <div>
                  <FL l="Repetir"/>
                  <select style={S.fi} value={form.recorrencia||"nao_repete"} onChange={e=>setForm(f=>({...f,recorrencia:e.target.value,recorrencia_fim:""}))}>
                    <option value="nao_repete">Não se repete</option>
                    <option value="diario">Todos os dias</option>
                    <option value="semanal">Toda semana</option>
                    <option value="quinzenal">A cada 2 semanas</option>
                    <option value="mensal">Todo mês</option>
                    <option value="anual">Todo ano</option>
                  </select>
                  {form.recorrencia&&form.recorrencia!=="nao_repete"&&(
                    <div style={{marginTop:8}}>
                      <FL l="Repetir até (opcional — deixe em branco para 52 ocorrências)"/>
                      <input style={S.fi} type="date" value={form.recorrencia_fim||""} onChange={e=>setForm(f=>({...f,recorrencia_fim:e.target.value}))}/>
                    </div>
                  )}
                  {form.recorrencia&&form.recorrencia!=="nao_repete"&&(
                    <div style={{fontSize:11,color:"#5a7aaa",marginTop:6,background:"#3b82f60d",border:"1px solid #3b82f622",borderRadius:6,padding:"6px 10px"}}>
                      {(()=>{
                        const labels={diario:"Todos os dias",semanal:"Toda semana",quinzenal:"A cada 2 semanas",mensal:"Todo mês",anual:"Todo ano"};
                        const max=form.recorrencia_fim?"até "+fmtData(form.recorrencia_fim):"por 52 ocorrências";
                        return labels[form.recorrencia]+" · "+max;
                      })()}
                    </div>
                  )}
                </div>
              )}
              <div style={{display:"flex",gap:8}}>
                {editando&&<button style={S.btnSec} onClick={()=>{setEditando(null);setForm({titulo:"",tipo:"atendimento",data:td(),hora:"",cliente_id:"",servico_id:"",obs:"",recorrencia:"nao_repete",recorrencia_fim:""});}} className="bs">Cancelar</button>}
                <button style={{...S.btnPrimary,flex:1}} onClick={salvar} className="bp">{editando?"Salvar Alteração":"+ Agendar"}</button>
              </div>
            </div>
          </div>
          <div>
            <div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center"}}>
              <input style={{...S.search,flex:1}} placeholder="Buscar..." value={busca} onChange={e=>setBusca(e.target.value)}/>
              <select style={{...S.selectSm,width:"auto"}} value={filtro} onChange={e=>setFiltro(e.target.value)}>
                <option value="pendente">Pendentes</option>
                <option value="realizado">Realizados</option>
                <option value="todos">Todos</option>
              </select>
            </div>
            {filtrados.length===0&&<div style={S.empty}>Nenhum agendamento encontrado.</div>}
            {filtrados.map(a=>{
              const cor=corTipo(a.tipo);
              const venc=a.status==="pendente"&&a.data<hoje;
              const ehHoje=a.data===hoje;
              return(
                <div key={a.id} style={{...S.card,borderLeft:"3px solid "+(venc?"#b46464":ehHoje?"#a87840":cor),marginBottom:10,padding:"12px 14px",opacity:a.status==="realizado"?0.6:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>

const GraficoPizza=({pago,resultado,total})=>{
  const fmtV=(v)=>Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});
  const pagoPct=total>0?Math.min((pago/total)*100,100):0;
  const lucPct=total>0?Math.max(0,(resultado/total)*100):0;
  const toRad=d=>(d-90)*Math.PI/180;
  const fatia=(cx,cy,r,s,e,cor)=>{
    if(e-s>=360){return <circle cx={cx} cy={cy} r={r} fill={cor}/>;}
    const x1=cx+r*Math.cos(toRad(s));const y1=cy+r*Math.sin(toRad(s));
    const x2=cx+r*Math.cos(toRad(e));const y2=cy+r*Math.sin(toRad(e));
    const large=e-s>180?1:0;
    return <path d={"M "+cx+" "+cy+" L "+x1+" "+y1+" A "+r+" "+r+" 0 "+large+" 1 "+x2+" "+y2+" Z"} fill={cor}/>;
  };
  const s1=0;const e1=pagoPct*3.6;
  const e2=e1+(resultado>0?lucPct*3.6:0);
  return(
    <div style={{...S.card,marginTop:14}}>
      <div style={S.cardTitle}>Distribuicao financeira do periodo</div>
      <div style={{display:"flex",alignItems:"center",gap:32,flexWrap:"wrap"}}>
        <svg viewBox="0 0 200 200" width={160} height={160} style={{flexShrink:0}}>
          {e1>0&&fatia(100,100,85,s1,e1,"#b46464")}
          {e2>e1&&fatia(100,100,85,e1,e2,"#5a8f6e")}
          {resultado<0&&fatia(100,100,85,e1,e1+(Math.abs(resultado)/total)*360,"#a87840")}
          <circle cx="100" cy="100" r="52" fill="#1e2128"/>
          <text x="100" y="96" textAnchor="middle" fontSize="11" fill="#8a8782">Total</text>
          <text x="100" y="112" textAnchor="middle" fontSize="13" fontWeight="bold" fill="#d6d3cc">R$ {fmtV(total)}</text>
        </svg>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {[[pago,"#b46464","Pago / Despesas"],[resultado>=0?resultado:0,"#5a8f6e","Resultado positivo"],[resultado<0?Math.abs(resultado):0,"#a87840","Resultado negativo"]].map(([v,c,l])=>v>0&&(
            <div key={l} style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:c,flexShrink:0,opacity:.7}}/>
              <div>
                <div style={{fontSize:11,color:"#5a5d66",textTransform:"uppercase",letterSpacing:"0.5px"}}>{l}</div>
                <div style={{fontSize:13,fontWeight:400,color:c,opacity:.82}}>R$ {fmtV(v)}</div>
                <div style={{fontSize:11,color:"#3e4048"}}>{total>0?((v/total)*100).toFixed(1):"0"}% do total</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const TelaRelatorios=({dadosMensais,totRec,totPag,lucro,recAno,melhorMes,anoFin,setAnoFin,recebimentos,pagamentos,servicos,cn})=>{
  const [abaRel,setAbaRel]=useState("financeiro");
  const [dtIni,setDtIni]=useState("");
  const [dtFim,setDtFim]=useState("");
  const recF=recebimentos.filter(r=>{
    if(dtIni&&(r.data||"")<dtIni)return false;
    if(dtFim&&(r.data||"")>dtFim)return false;
    if(!dtIni&&!dtFim)return(r.data||"").startsWith(String(anoFin));
    return true;
  });
  const pagF=pagamentos.filter(p=>{
    if(dtIni&&(p.data||"")<dtIni)return false;
    if(dtFim&&(p.data||"")>dtFim)return false;
    if(!dtIni&&!dtFim)return(p.data||"").startsWith(String(anoFin));
    return true;
  });
  const tR=recF.reduce((a,r)=>a+Number(r.valor),0);
  const tP=pagF.reduce((a,p)=>a+Number(p.valor),0);
  const luc=tR-tP;
  const pior=dadosMensais.filter(m=>m.recebido>0).length?dadosMensais.filter(m=>m.recebido>0).reduce((a,b)=>b.recebido<a.recebido?b:a):null;
  const imprimir=()=>imprimirRelatorio(dadosMensais,totRec,totPag,lucro,tR,tP,luc,dtIni,dtFim,anoFin);

  // Calculo honorarios
  const mesAtual=new Date().getMonth()+1;
  const anoAtual=new Date().getFullYear();
  const recMes=recebimentos.filter(r=>(r.data||"").startsWith(anoAtual+"-"+String(mesAtual).padStart(2,"0")));
  const recAnoH=recebimentos.filter(r=>(r.data||"").startsWith(String(anoFin)));
  const totalMes=recMes.reduce((a,r)=>a+Number(r.valor),0);
  const totalAnoH=recAnoH.reduce((a,r)=>a+Number(r.valor),0);

  // Por tipo de servico
  const porTipo={};
  (servicos||[]).forEach(s=>{
    const tipo=s.tipo||"Outros";
    if(!porTipo[tipo])porTipo[tipo]={tipo,total:0,pago:0,aberto:0,qtd:0};
    const valorTotal=Number(s.orcamento?.valor||0);
    const pags=(s.pagamentos||[]).reduce((a,p)=>a+Number(p.valor||0),0);
    porTipo[tipo].total+=valorTotal;
    porTipo[tipo].pago+=pags;
    porTipo[tipo].aberto+=(valorTotal-pags>0?valorTotal-pags:0);
    porTipo[tipo].qtd+=1;
  });
  const tiposList=Object.values(porTipo).sort((a,b)=>b.total-a.total);

  // Por cliente
  const porCliente={};
  (servicos||[]).forEach(s=>{
    const cliId=s.clienteId||s.cliente_id;
    const nome=cn?cn(cliId):"Cliente";
    if(!porCliente[cliId])porCliente[cliId]={nome,total:0,pago:0,aberto:0,qtd:0};
    const valorTotal=Number(s.orcamento?.valor||0);
    const pags=(s.pagamentos||[]).reduce((a,p)=>a+Number(p.valor||0),0);
    porCliente[cliId].total+=valorTotal;
    porCliente[cliId].pago+=pags;
    porCliente[cliId].aberto+=(valorTotal-pags>0?valorTotal-pags:0);
    porCliente[cliId].qtd+=1;
  });
  const clientesList=Object.values(porCliente).sort((a,b)=>b.total-a.total).slice(0,15);

  // Em aberto
  const emAberto=(servicos||[]).filter(s=>s.status!=="Concluído"&&s.status!=="Concluido").map(s=>{
    const valorTotal=Number(s.orcamento?.valor||0);
    const pags=(s.pagamentos||[]).reduce((a,p)=>a+Number(p.valor||0),0);
    const saldo=valorTotal-pags;
    return{...s,saldo,valorTotal,pags,clienteNome:cn?cn(s.clienteId||s.cliente_id):"?"};
  }).filter(s=>s.saldo>0).sort((a,b)=>b.saldo-a.saldo);
  const totalAberto=emAberto.reduce((a,s)=>a+s.saldo,0);

  const imprimirHonorarios=()=>{
    const css="body{font-family:Arial,sans-serif;padding:28px;font-size:12px;color:#1e293b;}h1{font-size:16px;font-weight:800;margin-bottom:4px;}h2{font-size:13px;font-weight:700;margin:18px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px;}table{width:100%;border-collapse:collapse;margin-bottom:16px;}th{background:#f1f5f9;padding:7px;text-align:left;font-size:11px;}td{padding:7px;border-bottom:1px solid #f1f5f9;font-size:12px;}.total{font-weight:800;background:#f8fafc;}.verde{color:#16a34a;}.vermelho{color:#dc2626;}@media print{button{display:none;}}";
    const corpo=`<h1>Relatório de Honorários — ${anoFin}</h1><p style="color:#64748b;font-size:11px;">Gerado em ${new Date().toLocaleDateString("pt-BR")}</p>
    <h2>Resumo</h2>
    <table><tr><th>Período</th><th>Total</th></tr>
    <tr><td>Mês atual</td><td class="verde">R$ ${fmt(totalMes)}</td></tr>
    <tr><td>Ano ${anoFin}</td><td class="verde">R$ ${fmt(totalAnoH)}</td></tr>
    <tr class="total"><td>Em aberto</td><td class="vermelho">R$ ${fmt(totalAberto)}</td></tr></table>
    <h2>Por Tipo de Serviço</h2>
    <table><tr><th>Tipo</th><th>Qtd</th><th>Total</th><th>Recebido</th><th>Em aberto</th></tr>
    ${tiposList.map(t=>`<tr><td>${t.tipo}</td><td>${t.qtd}</td><td>R$ ${fmt(t.total)}</td><td class="verde">R$ ${fmt(t.pago)}</td><td class="${t.aberto>0?"vermelho":""}">R$ ${fmt(t.aberto)}</td></tr>`).join("")}
    </table>
    <h2>Por Cliente (Top 15)</h2>
    <table><tr><th>Cliente</th><th>Processos</th><th>Total</th><th>Recebido</th><th>Em aberto</th></tr>
    ${clientesList.map(c=>`<tr><td>${c.nome}</td><td>${c.qtd}</td><td>R$ ${fmt(c.total)}</td><td class="verde">R$ ${fmt(c.pago)}</td><td class="${c.aberto>0?"vermelho":""}">R$ ${fmt(c.aberto)}</td></tr>`).join("")}
    </table>`;
    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><meta charset=UTF-8><title>Honorários ${anoFin}</title><style>${css}</style></head><body>${corpo}<br><button onclick=window.print() style=background:#1e293b;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer;font-size:14px>Imprimir / Salvar PDF</button></body></html>`);
    w.document.close();
  };

  return(
    <div style={S.tela}>
      <PageHeader title="Relatorios" sub="Analise estrategica">
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <select style={S.selectSm} value={anoFin} onChange={e=>{setAnoFin(Number(e.target.value));setDtIni("");setDtFim("");}}>{[2023,2024,2025,2026].map(a=><option key={a}>{a}</option>)}</select>
          <input style={{...S.search,width:130}} type="date" value={dtIni} onChange={e=>setDtIni(e.target.value)}/>
          <span style={{color:"#4a4d56",fontSize:12}}>ate</span>
          <input style={{...S.search,width:130}} type="date" value={dtFim} onChange={e=>setDtFim(e.target.value)}/>
          {(dtIni||dtFim)&&<button style={{...S.btnSm,color:"#b46464"}} onClick={()=>{setDtIni("");setDtFim("");}} className="bs">x</button>}
        </div>
        {abaRel==="honorarios"?<button style={S.btnPrimary} onClick={imprimirHonorarios} className="bp">Imprimir Honorarios</button>:<button style={S.btnPrimary} onClick={imprimir} className="bp">Imprimir Relatorio</button>}
      </PageHeader>

      {/* Abas internas */}
      <div style={{display:"flex",gap:0,padding:"0 24px",background:"#1e2128",borderBottom:"1px solid #0f1f35"}}>
        {[{k:"financeiro",l:"◉ Financeiro"},{k:"honorarios",l:"▣ Honorários"}].map(a=>(
          <button key={a.k} onClick={()=>setAbaRel(a.k)} style={{...S.abaBtn,...(abaRel===a.k?S.abaBtnActive:{})}} className="ab">{a.l}</button>
        ))}
      </div>

      <div style={S.body}>
        {abaRel==="honorarios"&&(
          <div>
            {/* Cards resumo */}
            <div style={S.sg4}>
              <StatCard icon="+" label={"Mes de "+new Date().toLocaleDateString("pt-BR",{month:"long"})} value={"R$ "+fmt(totalMes)} color="#5a8f6e"/>
              <StatCard icon="+" label={"Ano "+anoFin} value={"R$ "+fmt(totalAnoH)} color="#5a7aaa"/>
              <StatCard icon="!" label="Em aberto" value={"R$ "+fmt(totalAberto)} color="#a87840"/>
              <StatCard icon="=" label="Processos c/ saldo" value={emAberto.length+" proc."} color="#7a6aaa"/>
            </div>

            {/* Por tipo de servico */}
            <div style={{...S.card,marginTop:14}}>
              <div style={S.cardTitle}>Por tipo de servico</div>
              <table style={S.table}>
                <thead><tr>{["Tipo","Qtd","Total","Recebido","Em aberto"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
                <tbody>
                  {tiposList.map((t,i)=>(
                    <tr key={i} style={S.tr} className="tr">
                      <td style={{...S.td,fontWeight:600,color:"#d6d3cc"}}>{t.tipo}</td>
                      <td style={S.td}>{t.qtd}</td>

const imprimirCC = (func, empresa, cnpj, endereco, mes, ano, bonus) => {
  const mesNome = ["Janeiro","Fevereiro","Marco","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][mes-1];
  const s = Number(func.salario||0);
  const diasMes = new Date(ano, mes, 0).getDate();
  const bonusV = Number(bonus||0);
  const inss = (v) => { if(v<=1518) return v*0.075; if(v<=2666.68) return v*0.09; if(v<=4000.03) return v*0.12; if(v<=7786.02) return v*0.14; return 908.86; };
  const irrf = (b) => { if(b<=2259.20) return 0; if(b<=2826.65) return b*0.075-169.44; if(b<=3751.05) return b*0.15-381.44; if(b<=4664.68) return b*0.225-662.77; return b*0.275-896; };
  const pINSS = inss(s);
  const pIRRF = Math.max(0, irrf(s - pINSS));
  const fgts  = s * 0.08;
  const liq   = s + bonusV - pINSS - pIRRF;
  const fR    = (v) => Number(v||0).toFixed(2).replace(".",",");
  const css = "body{font-family:Arial,sans-serif;font-size:11px;padding:20px;}"+

    ".emp{padding:10px 16px;border-bottom:1px solid #ccc;display:flex;justify-content:space-between;background:#f8fafc;}"+
    ".fb{padding:10px 16px;border-bottom:2px solid #1e293b;display:flex;justify-content:space-between;background:#f1f5f9;}"+
    ".lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:#64748b;}"+
    ".val{font-size:12px;font-weight:700;color:#1e293b;margin-top:2px;}"+
    "table{width:100%;border-collapse:collapse;}th{background:#1e293b;color:#fff;padding:6px 10px;text-align:left;font-size:10px;}"+
    "td{padding:5px 10px;border-bottom:1px solid #e2e8f0;font-size:11px;}tr:nth-child(even) td{background:#f8fafc;}"+
    ".g{color:#16a34a;font-weight:700;}.r{color:#dc2626;font-weight:700;}.b{color:#1d4ed8;font-weight:700;}"+
    ".tots{display:flex;justify-content:space-between;padding:12px 16px;border-top:2px solid #1e293b;background:#f8fafc;}"+
    ".tb{text-align:center;padding:6px 16px;border-radius:6px;}"+
    ".tb.g{background:#dcfce7;border:1px solid #16a34a;}.tb.r{background:#fee2e2;border:1px solid #dc2626;}"+
    ".tb.b{background:#dbeafe;border:2px solid #1d4ed8;}.tb .tv{font-size:15px;font-weight:800;margin-top:3px;}"+
    ".assin{display:flex;justify-content:space-between;padding:30px 40px 16px;border-top:1px solid #ccc;}"+
    ".asl{text-align:center;width:42%;}.asl-l{border-top:1px solid #000;margin-top:40px;padding-top:5px;font-size:10px;}"+
    ".rod{padding:8px 16px;background:#1e293b;color:#fff;font-size:9px;text-align:center;}"+
    "@media print{button{display:none!important;}}";
  const w = window.open("","_blank");
  w.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Contracheque "+func.nome+" "+mesNome+"/"+ano+"</title><style>"+css+"</style></head><body>"+
    "<div class='page'>"+
    "<div class='hd'><div><div class='sub'>RECIBO DE PAGAMENTO DE SALARIO</div><h1>CONTRACHEQUE</h1></div>"+
    "<div style='text-align:right'><div class='sub'>Competencia</div><div style='font-size:14px;font-weight:800'>"+mesNome+" / "+ano+"</div></div></div>"+
    "<div class='emp'>"+
    "<div><div class='lbl'>Empresa / Empregador</div><div class='val'>"+empresa+"</div><div style='font-size:10px;color:#475569'>CNPJ: "+cnpj+"</div></div>"+
    "<div style='text-align:right'><div class='lbl'>Endereco</div><div style='font-size:10px;color:#475569'>"+endereco+"</div></div></div>"+
    "<div class='fb'>"+
    "<div><div class='lbl'>Funcionario</div><div class='val'>"+func.nome+"</div></div>"+
    "<div><div class='lbl'>Cargo</div><div class='val'>"+func.cargo+"</div></div>"+
    "<div><div class='lbl'>Admissao</div><div class='val'>"+(func.admissao||"-")+"</div></div>"+
    "<div><div class='lbl'>Salario Base</div><div class='val'>R$ "+fR(s)+"</div></div></div>"+
    "<table><tr><th>Descricao</th><th style='text-align:center'>Referencia</th><th style='text-align:right'>Proventos</th><th style='text-align:right'>Descontos</th></tr>"+
    "<tr><td>Salario Base</td><td style='text-align:center'>"+diasMes+" dias</td><td class='g' style='text-align:right'>R$ "+fR(s)+"</td><td style='text-align:right'>-</td></tr>"+

    "<div class='tb g'><div class='lbl'>Total Proventos</div><div class='tv g'>R$ "+fR(s+bonusV)+"</div></div>"+
    "<div class='tb r'><div class='lbl'>Total Descontos</div><div class='tv r'>R$ "+fR(pINSS+pIRRF)+"</div></div>"+
    "<div class='tb b'><div class='lbl'>LIQUIDO A RECEBER</div><div class='tv b'>R$ "+fR(liq)+"</div></div></div>"+
    "<p style='font-size:9px;color:#64748b;padding:4px 16px'>* FGTS depositado pelo empregador | INSS e IRRF tabelas progressivas 2025</p>"+
    "<div class='assin'>"+
    "<div class='asl'><div class='asl-l'>"+func.nome+"<br><span style='font-size:9px'>Assinatura do Funcionario</span></div></div>"+
    "<div class='asl'><div class='asl-l'>"+empresa+"<br><span style='font-size:9px'>Assinatura do Empregador</span></div></div></div>"+
    "<div class='rod'>DocImovel PRO - "+new Date().toLocaleDateString("pt-BR")+"</div></div>"+
    "<br><button onclick='window.print()' style='background:#1e293b;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer;font-size:13px;margin:12px'>Imprimir / PDF</button>"+
    "</body></html>");
  w.document.close();
  addHistCC({func:{nome:func.nome,cargo:func.cargo}, empresa, cnpj, mes, ano, bonus, liquido:liq, competencia:mesNome+"/"+ano});
};

const SM_ATUAL = 1518;

const imprimirRelPessoal = (funcs, fC) => {
  const w = window.open("", "_blank");
  const inss = (s) => {
    if(s <= 1518) return s * 0.075;
    if(s <= 2666.68) return s * 0.09;
    if(s <= 4000.03) return s * 0.12;
    if(s <= 7786.02) return s * 0.14;
    return 908.86;
  };
  let rows = "";
  let totalMes = 0;
  funcs.forEach(f => {
    const s = Number(f.salario || 0);
    const dec = s / 12;
    const fer = (s / 3) / 12;
    const enc = Number(f.enc || 0);
    const mes = s + dec + fer + enc;
    totalMes += mes;
    rows += "<tr><td>" + f.nome + "</td><td>" + f.cargo + "</td><td style='color:#16a34a;font-weight:700'>R$ " + fC(s) + "</td><td>R$ " + fC(dec) + "</td><td>R$ " + fC(fer) + "</td><td>R$ " + fC(enc) + "</td><td style='color:#dc2626;font-weight:700'>R$ " + fC(mes) + "</td></tr>";
  });
  const css = "body{font-family:Arial,sans-serif;padding:28px;}h1{font-size:16px;border-bottom:2px solid #000;padding-bottom:8px;}table{width:100%;border-collapse:collapse;font-size:11px;}th{background:#1e293b;color:#fff;padding:7px 10px;text-align:left;}td{padding:6px 10px;border-bottom:1px solid #eee;}.tot td{background:#f0f0f0;font-weight:800;}@media print{button{display:none;}}";
  const ths = "<tr><th>Funcionario</th><th>Cargo</th><th>Salario</th><th>13/mes</th><th>Ferias/mes</th><th>Encargos</th><th>Custo/mes</th></tr>";
  const tot = "<tr class='tot'><td colspan='6'>TOTAL MENSAL</td><td style='color:#dc2626;font-weight:800'>R$ " + fC(totalMes) + "</td></tr>";
  w.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Rel. Pessoal</title><style>" + css + "</style></head><body><h1>Relatorio de Custos com Pessoal</h1><p style='color:#666;font-size:11px'>Emitido em " + new Date().toLocaleDateString("pt-BR") + " | " + funcs.length + " funcionario(s)</p><table>" + ths + rows + tot + "</table><br><button onclick='window.print()' style='background:#1e293b;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer'>Imprimir</button></body></html>");
  w.document.close();
};

                    const atual = k(i) === (new Date().getFullYear() + "-" + String(new Date().getMonth()+1).padStart(2,"0"));
                    return (
                      <tr key={i} style={{...S.tr, background:atual?"#1d4ed808":""}} className="tr">
                        <td style={S.td}><span style={{fontWeight:atual?700:400,color:atual?"#d6d3cc":"#8a8782"}}>{mes}{atual?" *":""}</span></td>
                        {fixos.map((v,j) => <td key={j} style={S.td}>{v>0?"R$ "+fC(v):"-"}</td>)}
                        <td style={S.td}>{ou>0?"R$ "+fC(ou):"-"}</td>
                        <td style={S.td}>{totalFuncsMes>0?"R$ "+fC(totalFuncsMes):"-"}</td>
                        <td style={S.td}><span style={{fontWeight:800,color:"#b46464"}}>R$ {fC(tot)}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

      </div>

      {mf && (
        <div style={S.overlay}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <div style={S.modalHeader}>
              <span style={S.modalTitle}>{mf.id ? "Editar Funcionario" : "Novo Funcionario"}</span>
              <button style={S.modalClose} onClick={() => setMf(null)}>X</button>
            </div>
            <div style={S.modalBody}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{gridColumn:"1/-1"}}><FI l="Nome completo" v={mf.nome||""} set={v => setMf(m => ({...m,nome:v}))}/></div>
                <FI l="Cargo" v={mf.cargo||""} set={v => setMf(m => ({...m,cargo:v}))}/>
                <FI l="Data admissao" v={mf.admissao||""} set={v => setMf(m => ({...m,admissao:v}))} type="date"/>
                <FI l="Salario base (R$)" v={mf.salario||""} set={v => setMf(m => ({...m,salario:v}))} type="number"/>
                <FI l="Encargos/mes (R$)" v={mf.enc||""} set={v => setMf(m => ({...m,enc:v}))} type="number"/>
              </div>
            </div>
            <div style={S.modalFooter}>
              <button style={S.btnSec} onClick={() => setMf(null)} className="bs">Cancelar</button>
              <button style={S.btnPrimary} onClick={() => {
                if(!mf.nome) return showToast("Informe o nome.", "erro");
                if(mf.id) setFuncs(p => p.map(f => f.id===mf.id ? mf : f));
                else      setFuncs(p => [...p, {...mf, id:Date.now()}]);
                setMf(null);
                showToast("Funcionario salvo!");
              }} className="bp">Salvar</button>
            </div>
          </div>
        </div>
      )}

      {modalFerias&&(
        <div style={S.overlay}>
          <div style={{...S.modal,maxWidth:480}} onClick={e=>e.stopPropagation()}>
            <div style={S.modalHeader}>
              <span style={S.modalTitle}>Ferias - {modalFerias.func.nome}</span>
              <button style={S.modalClose} onClick={()=>setModalFerias(null)}>X</button>
            </div>
            <div style={S.modalBody}>
              {(()=>{
                const s = Number(modalFerias.func.salario||0);
                const diasSolicitados = Number(modalFerias.dias||0);
                const valorDiario = s/30;
                const valorFerias = valorDiario * diasSolicitados;
                const umTerco = valorFerias / 3;
                const totalBruto = valorFerias + umTerco;
                const inss = (v) => { if(v<=1518) return v*0.075; if(v<=2666.68) return v*0.09; if(v<=4000.03) return v*0.12; if(v<=7786.02) return v*0.14; return 908.86; };
                const irrf = (b) => { if(b<=2259.20) return 0; if(b<=2826.65) return b*0.075-169.44; if(b<=3751.05) return b*0.15-381.44; if(b<=4664.68) return b*0.225-662.77; return b*0.275-896; };
                const descINSS = inss(totalBruto);
                const descIRRF = Math.max(0, irrf(totalBruto - descINSS));
                const liquido = totalBruto - descINSS - descIRRF;
                const fR = (v) => Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});

                const imprimir = () => {
                  const w = window.open("","_blank");
                  const css = "body{font-family:Arial,sans-serif;padding:32px;max-width:700px;margin:0 auto;}h1{font-size:16px;border-bottom:2px solid #1e293b;padding-bottom:8px;}table{width:100%;border-collapse:collapse;font-size:12px;margin:12px 0;}th{background:#1e293b;color:#fff;padding:7px 10px;text-align:left;}td{padding:6px 10px;border-bottom:1px solid #eee;}.g{color:#16a34a;font-weight:700;}.r{color:#dc2626;font-weight:700;}.b{font-weight:800;}.tot{background:#f0f0f0;}.sig{margin-top:50px;display:flex;justify-content:space-between;}.sl{text-align:center;width:45%;border-top:1px solid #000;padding-top:6px;font-size:11px;}@media print{button{display:none;}}";
                  w.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Recibo de Ferias</title><style>"+css+"</style></head><body>"+
                    "<h1>RECIBO DE PAGAMENTO DE FERIAS</h1>"+
                    "<p><b>Funcionario:</b> "+modalFerias.func.nome+" &nbsp;&nbsp; <b>Cargo:</b> "+modalFerias.func.cargo+"</p>"+
                    "<p><b>Periodo:</b> "+diasSolicitados+" dia(s) de ferias &nbsp;&nbsp; <b>Tipo:</b> "+(modalFerias.tipo==="venda"?"Venda de dias (abono pecuniario)":"Gozo de ferias")+"</p>"+
                    (modalFerias.obs?"<p><b>Obs:</b> "+modalFerias.obs+"</p>":"")+
                    "<table><tr><th>Descricao</th><th>Dias</th><th>Proventos</th><th>Descontos</th></tr>"+
                    "<tr><td>Ferias ("+diasSolicitados+" dias)</td><td>"+diasSolicitados+"</td><td class='g'>R$ "+fR(valorFerias)+"</td><td>-</td></tr>"+
                    "<tr><td>1/3 constitucional</td><td>-</td><td class='g'>R$ "+fR(umTerco)+"</td><td>-</td></tr>"+
                    "<tr><td>INSS s/ ferias</td><td>-</td><td>-</td><td class='r'>R$ "+fR(descINSS)+"</td></tr>"+
                    "<tr><td>IRRF s/ ferias</td><td>-</td><td>-</td><td class='r'>R$ "+fR(descIRRF)+"</td></tr>"+
                    "<tr class='tot'><td class='b' colspan='2'>LIQUIDO A RECEBER</td><td class='b' colspan='2' style='color:#1d4ed8'>R$ "+fR(liquido)+"</td></tr>"+
                    "</table>"+
                    "<div class='sig'>"+
                    "<div class='sl'>"+modalFerias.func.nome+"<br>Funcionario</div>"+
                    "<div class='sl'>Empregador<br>"+new Date().toLocaleDateString("pt-BR")+"</div>"+
                    "</div>"+
                    "<br><button onclick='window.print()' style='background:#1e293b;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer;margin-top:16px'>Imprimir / PDF</button>"+
                    "</body></html>");
                  w.document.close();
                };

                return(
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    <div style={{background:"#2a2d36",borderRadius:8,padding:"12px"}}>
                      <div style={{fontWeight:700,color:"#8a8782",marginBottom:8,fontSize:11,textTransform:"uppercase"}}>Configuracao</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                        <div>
                          <FL l="Tipo"/>
                          <select style={S.fi} value={modalFerias.tipo} onChange={e=>setModalFerias(m=>({...m,tipo:e.target.value}))}>
                            <option value="venda">Venda de dias (abono)</option>
                            <option value="gozo">Gozo de ferias</option>
                          </select>
                        </div>
                        <FI l="Quantidade de dias" v={modalFerias.dias||""} set={v=>setModalFerias(m=>({...m,dias:v}))} type="number" ph="Ex: 10"/>
                        <div style={{gridColumn:"1/-1"}}><FI l="Observacao (opcional)" v={modalFerias.obs||""} set={v=>setModalFerias(m=>({...m,obs:v}))} ph="Ex: Ferias referente ao periodo 2024/2025"/></div>
                      </div>
                    </div>
                    {diasSolicitados>0&&(
                      <div style={{background:"#22c55e0d",border:"1px solid #22c55e33",borderRadius:8,padding:"12px"}}>
                        <div style={{fontWeight:700,color:"#5a8f6e",marginBottom:8,fontSize:12}}>Calculo automatico ({diasSolicitados} dias)</div>
                        {[
                          ["Salario base","#d6d3cc",s],
                          ["Valor diario","#8a8782",valorDiario],
                          ["Ferias ("+diasSolicitados+" dias)","#5a8f6e",valorFerias],
                          ["+ 1/3 constitucional","#5a8f6e",umTerco],
                          ["= Total bruto","#d6d3cc",totalBruto],
                          ["- INSS","#b46464",-descINSS],
                          ["- IRRF","#b46464",-descIRRF],
                          ["= Liquido a receber","#5a7aaa",liquido],
                        ].map(([l,c,v])=>(
                          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #0f1f3533",fontSize:12}}>
                            <span style={{color:"#5a5d66"}}>{l}</span>
                            <span style={{color:c,fontWeight:600}}>R$ {fR(Math.abs(v))}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {diasSolicitados<=0&&<div style={{background:"#f59e0b0d",border:"1px solid #f59e0b33",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#a87840"}}>Informe a quantidade de dias para ver o calculo.</div>}
                  </div>
                );
              })()}
            </div>
            <div style={S.modalFooter}>
              <button style={S.btnSec} onClick={()=>setModalFerias(null)} className="bs">Cancelar</button>
              <button style={{...S.btnPrimary,...(Number(modalFerias.dias||0)<=0?{opacity:.5,cursor:"not-allowed"}:{})}} onClick={()=>{
                if(Number(modalFerias.dias||0)<=0) return showToast("Informe os dias de ferias.","erro");
                const w = window.open("","_blank");
                const s2 = Number(modalFerias.func.salario||0);
                const d = Number(modalFerias.dias||0);
                const vD = s2/30; const vF = vD*d; const t3 = vF/3; const tot = vF+t3;
                const inssF = (v) => { if(v<=1518) return v*0.075; if(v<=2666.68) return v*0.09; if(v<=4000.03) return v*0.12; if(v<=7786.02) return v*0.14; return 908.86; };
                const irrfF = (b) => { if(b<=2259.20) return 0; if(b<=2826.65) return b*0.075-169.44; if(b<=3751.05) return b*0.15-381.44; if(b<=4664.68) return b*0.225-662.77; return b*0.275-896; };
                const dI = inssF(tot); const dR = Math.max(0,irrfF(tot-dI)); const liq = tot-dI-dR;
                const fR2 = (v) => Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});
                const css2 = "body{font-family:Arial,sans-serif;padding:32px;max-width:700px;margin:0 auto;}h1{font-size:16px;border-bottom:2px solid #1e293b;padding-bottom:8px;}table{width:100%;border-collapse:collapse;font-size:12px;margin:12px 0;}th{background:#1e293b;color:#fff;padding:7px 10px;text-align:left;}td{padding:6px 10px;border-bottom:1px solid #eee;}.g{color:#16a34a;font-weight:700;}.r{color:#dc2626;font-weight:700;}.b{font-weight:800;}.tot{background:#f0f0f0;}.sig{margin-top:50px;display:flex;justify-content:space-between;}.sl{text-align:center;width:45%;border-top:1px solid #000;padding-top:6px;font-size:11px;}@media print{button{display:none;}}";
                w.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Recibo de Ferias</title><style>"+css2+"</style></head><body><h1>RECIBO DE PAGAMENTO DE FERIAS</h1><p><b>Funcionario:</b> "+modalFerias.func.nome+" &nbsp;&nbsp; <b>Cargo:</b> "+modalFerias.func.cargo+"</p><p><b>Periodo:</b> "+d+" dia(s) - "+(modalFerias.tipo==="venda"?"Venda de dias (abono pecuniario)":"Gozo de ferias")+"</p>"+(modalFerias.obs?"<p><b>Obs:</b> "+modalFerias.obs+"</p>":"")+"<table><tr><th>Descricao</th><th>Dias</th><th>Proventos</th><th>Descontos</th></tr><tr><td>Ferias ("+d+" dias)</td><td>"+d+"</td><td class='g'>R$ "+fR2(vF)+"</td><td>-</td></tr><tr><td>1/3 constitucional</td><td>-</td><td class='g'>R$ "+fR2(t3)+"</td><td>-</td></tr><tr><td>INSS s/ ferias</td><td>-</td><td>-</td><td class='r'>R$ "+fR2(dI)+"</td></tr><tr><td>IRRF s/ ferias</td><td>-</td><td>-</td><td class='r'>R$ "+fR2(dR)+"</td></tr><tr class='tot'><td class='b' colspan='2'>LIQUIDO A RECEBER</td><td class='b' colspan='2' style='color:#1d4ed8'>R$ "+fR2(liq)+"</td></tr></table><div class='sig'><div class='sl'>"+modalFerias.func.nome+"<br>Funcionario</div><div class='sl'>Empregador<br>"+new Date().toLocaleDateString("pt-BR")+"</div></div><br><button onclick='window.print()' style='background:#1e293b;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer;margin-top:16px'>Imprimir / PDF</button></body></html>");
                w.document.close();
                setModalFerias(null);
                showToast("Recibo de ferias gerado!");
              }} className="bp">Gerar Recibo de Ferias</button>
            </div>
          </div>
        </div>
      )}
      <ModalContracheque func={funcCC} onClose={() => setFuncCC(null)} showToast={showToast}/>

    </div>
  );
};

  </div></div>

const ModalCliente=({inicial,onSave,onClose,clientes=[]})=>{
  const [form,setForm]=useState({tipo:"pf",...inicial});
  const [aviso,setAviso]=useState("");
  const checarCPF=(v)=>{
    const n=v.replace(/\D/g,"");
    if(n.length<11)return;
    const dup=clientes.find(c=>c.id!==form.id&&(c.cpf||c.cnpj||"").replace(/\D/g,"")===n);
    setAviso(dup?"⚠ CPF/CNPJ já cadastrado: "+dup.nome:"");
  };
  return(<Modal title={form.id?"Editar Cliente":"Novo Cliente"} onClose={onClose} onSave={()=>{if(aviso&&!window.confirm("CPF já existe. Continuar?"))return;onSave(form);}} wide>
    {aviso&&<div style={{background:"#f59e0b11",border:"1px solid #f59e0b44",borderRadius:7,padding:"9px 14px",color:"#a87840",fontSize:13,marginBottom:12,fontWeight:600}}>{aviso}</div>}
    <div style={{marginBottom:12}}><FL l="Tipo"/><div style={{display:"flex",gap:6}}>{["pf","pj"].map(t=><button key={t} style={{...S.btnSm,...(form.tipo===t?{background:"#3b82f622",color:"#5a7aaa",borderColor:"#3b82f644"}:{})}} onClick={()=>setForm({...form,tipo:t})} className="bs">{t==="pf"?"Pessoa Física":"Pessoa Jurídica"}</button>)}</div></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <div style={{gridColumn:"1/-1"}}><FL l={form.tipo==="pj"?"Razão Social":"Nome completo"}/><input style={S.fi} value={form.nome||""} onChange={e=>setForm({...form,nome:e.target.value})}/></div>
      {form.tipo==="pf"?<><div><FL l="CPF"/><input style={S.fi} value={form.cpf||""} onChange={e=>{setForm({...form,cpf:e.target.value});checarCPF(e.target.value);}} placeholder="000.000.000-00"/></div><FI l="RG" v={form.rg||""} set={v=>setForm({...form,rg:v})}/></>:<><div><FL l="CNPJ"/><input style={S.fi} value={form.cnpj||""} onChange={e=>{setForm({...form,cnpj:e.target.value});checarCPF(e.target.value);}} placeholder="00.000.000/0000-00"/></div><FI l="Nome Fantasia" v={form.fantasia||""} set={v=>setForm({...form,fantasia:v})}/></>}
      <FI l="Telefone" v={form.telefone||""} set={v=>setForm({...form,telefone:v})}/>
      <FI l="WhatsApp" v={form.whatsapp||""} set={v=>setForm({...form,whatsapp:v})}/>
      <div style={{gridColumn:"1/-1"}}><FI l="E-mail" v={form.email||""} set={v=>setForm({...form,email:v})} type="email"/></div>
      <div style={{gridColumn:"1/-1"}}><FI l="Endereço" v={form.endereco||""} set={v=>setForm({...form,endereco:v})}/></div>
      <FI l="Cidade" v={form.cidade||""} set={v=>setForm({...form,cidade:v})}/>
      <FI l="Estado (UF)" v={form.estado||""} set={v=>setForm({...form,estado:v})} ph="SP"/>
      {form.tipo==="pf"&&<>
        <div style={{gridColumn:"1/-1"}}><FL l="Estado Civil"/><select style={S.fi} value={form.estadoCivil||""} onChange={e=>setForm({...form,estadoCivil:e.target.value})}><option value="">Selecione...</option>{["Solteiro(a)","Casado(a)","Divorciado(a)","Viúvo(a)","União Estável"].map(o=><option key={o}>{o}</option>)}</select></div>
        <FI l="Profissão" v={form.profissao||""} set={v=>setForm({...form,profissao:v})}/>
        <FI l="Naturalidade" v={form.naturalidade||""} set={v=>setForm({...form,naturalidade:v})} ph="Ex: Feira de Santana/BA"/>
        <div style={{gridColumn:"1/-1"}}><FI l="Filiação (pai e mãe)" v={form.filiacao||""} set={v=>setForm({...form,filiacao:v})} ph="Ex: Maria Silva e João Silva"/></div>
        <FI l="Data de Nascimento" v={form.dataNascimento||""} set={v=>setForm({...form,dataNascimento:v})} type="date"/>
        <FI l="CNH (opcional)" v={form.cnh||""} set={v=>setForm({...form,cnh:v})} ph="Número da CNH"/>
        {(form.estadoCivil==="Casado(a)"||form.estadoCivil==="União Estável")&&(
          <div style={{gridColumn:"1/-1",background:"#3b82f60a",border:"1px solid #3b82f622",borderRadius:10,padding:"14px"}}>
            <div style={{fontSize:11,fontWeight:800,color:"#5a7aaa",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:12}}>💍 Dados do Cônjuge</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={{gridColumn:"1/-1"}}><FI l="Nome completo do cônjuge" v={form.conjugeNome||""} set={v=>setForm({...form,conjugeNome:v})}/></div>
              <FI l="CPF do cônjuge" v={form.conjugeCpf||""} set={v=>setForm({...form,conjugeCpf:v})} ph="000.000.000-00"/>
              <FI l="RG do cônjuge" v={form.conjugeRg||""} set={v=>setForm({...form,conjugeRg:v})}/>
              <FI l="Profissão do cônjuge" v={form.conjugeProfissao||""} set={v=>setForm({...form,conjugeProfissao:v})}/>
              <FI l="Naturalidade do cônjuge" v={form.conjugeNaturalidade||""} set={v=>setForm({...form,conjugeNaturalidade:v})} ph="Ex: Feira de Santana/BA"/>
              <div style={{gridColumn:"1/-1"}}><FI l="Filiação do cônjuge" v={form.conjugeFiliacao||""} set={v=>setForm({...form,conjugeFiliacao:v})} ph="Ex: Maria Silva e João Silva"/></div>
              <div style={{gridColumn:"1/-1"}}><FL l="Regime de Bens"/><select style={S.fi} value={form.regimeBens||""} onChange={e=>setForm({...form,regimeBens:e.target.value})}><option value="">Selecione...</option>{["Comunhão Parcial de Bens","Comunhão Universal de Bens","Separação Total de Bens","Participação Final nos Aquestos"].map(o=><option key={o}>{o}</option>)}</select></div>
              <FI l="Data do Casamento" v={form.dataCasamento||""} set={v=>setForm({...form,dataCasamento:v})} type="date"/>
              <FI l="Cartório do Casamento" v={form.cartorioCasamento||""} set={v=>setForm({...form,cartorioCasamento:v})} ph="Ex: RCPN Feira de Santana/BA"/>
              <FI l="Livro" v={form.casamentoLivro||""} set={v=>setForm({...form,casamentoLivro:v})} ph="Ex: B-18"/>
              <FI l="Folha / Termo" v={form.casamentoFolha||""} set={v=>setForm({...form,casamentoFolha:v})} ph="Ex: Folha 43v, Termo 135"/>
            </div>
          </div>

const PrintProtocolo=({servico,cliente,onClose})=>{
  const isVia=servico._via;
  const docs=CHECKLIST.filter(i=>(servico.checklist||{})[i.key]);
  const abrir=()=>{
    const cli=cliente||{};
    const css="body{font-family:Arial,sans-serif;padding:40px;max-width:720px;margin:0 auto;color:#1e293b;}"+
      ".header{display:flex;justify-content:space-between;border-bottom:2px solid #1e293b;padding-bottom:12px;margin-bottom:16px;}"+
      ".titulo{font-weight:800;font-size:18px;}.proto{font-family:monospace;font-size:13px;color:#7c3aed;font-weight:700;}"+
      ".subtitulo{text-align:center;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;}"+
      ".secao{font-weight:700;font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid #e2e8f0;}"+
      ".row{display:flex;gap:8px;font-size:12px;margin-bottom:4px;}.lbl{color:#475569;min-width:80px;font-weight:600;}"+
      ".doc{font-size:12px;padding:3px 0;border-bottom:1px dotted #e2e8f0;}"+
      ".assin{display:flex;justify-content:space-around;margin-top:32px;padding-top:18px;border-top:1px solid #e2e8f0;}"+
      ".asl{text-align:center;}.asl-line{font-size:12px;margin-bottom:4px;}"+
      "@media print{button{display:none;}}";
    const rows=[["Nome",cli.nome],[cli.tipo==="pj"?"CNPJ":"CPF",cli.cpf||cli.cnpj],["Telefone",cli.telefone],["E-mail",cli.email],["Endereco",(cli.endereco||"")+(cli.cidade?", "+cli.cidade:"")+(cli.estado?"/"+cli.estado:"")]].filter(([,v])=>v).map(([l,v])=>"<div class='row'><span class='lbl'>"+l+":</span><span>"+v+"</span></div>").join("");
    const srvRows=[["Tipo",servico.tipo],["Descricao",servico.descricao],["Abertura",(servico.created_at||"").slice(0,10)],["Estagio",servico.estagio],servico.orcamento?.valor?["Orcamento","R$ "+Number(servico.orcamento.valor).toLocaleString("pt-BR",{minimumFractionDigits:2})]:null].filter(Boolean).filter(([,v])=>v).map(([l,v])=>"<div class='row'><span class='lbl'>"+l+":</span><span>"+v+"</span></div>").join("");
    const docsHtml=docs.length>0?docs.map(d=>"<div class='doc'>&#10003; "+d.label+"</div>").join(""):"<div style='font-size:12px;color:#64748b'>Nenhum documento registrado.</div>";
    const w=window.open("","_blank");
    w.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>"+(isVia?"Via do Cliente":"Protocolo")+" - "+servico.protocolo+"</title><style>"+css+"</style></head><body>"+
      "<div class='header'><div class='titulo'>DocImovel PRO</div><div class='proto'>"+servico.protocolo+"</div></div>"+
      "<div class='subtitulo'>"+(isVia?"RECIBO DE DOCUMENTOS APRESENTADOS":"PROTOCOLO DE ABERTURA DE SERVICO")+"</div>"+
      "<div class='secao'>DADOS DO CLIENTE</div>"+rows+
      "<div class='secao'>DADOS DO SERVICO</div>"+srvRows+
      "<div class='secao'>DOCUMENTOS "+(isVia?"APRESENTADOS":"RECEBIDOS")+"</div>"+docsHtml+
      (servico.outrosDesc?"<div class='doc'>&#10003; Outros: "+servico.outrosDesc+"</div>":"")+
      "<div class='assin'>"+
        "<div class='asl'><div class='asl-line'>____________________________</div><div style='font-size:10px;color:#64748b'>Responsavel</div></div>"+
        "<div class='asl'><div class='asl-line'>____________________________</div><div style='font-size:10px;color:#64748b'>"+(cli.nome||"Cliente")+"</div></div>"+
      "</div>"+
      "<div style='margin-top:16px;font-size:10px;color:#94a3b8;text-align:right'>Emitido em: "+new Date().toLocaleDateString("pt-BR")+" - DocImovel PRO</div>"+
      "<br><button onclick='window.print()' style='background:#1e293b;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer;margin-top:10px'>Imprimir / PDF</button>"+
      "</body></html>");
    w.document.close();
  };
  return(
    <div style={S.overlay}>
      <div style={{...S.modal,maxWidth:420}} onClick={e=>e.stopPropagation()}>
        <div style={S.modalHeader}>
          <span style={S.modalTitle}>{isVia?"Via do Cliente":"Protocolo"} - {servico.protocolo}</span>
          <button style={S.modalClose} onClick={onClose}>X</button>
        </div>
        <div style={S.modalBody}>
          <div style={{background:"#2a2d36",borderRadius:8,padding:"12px",fontSize:13}}>
            <div style={{fontWeight:700,color:"#d6d3cc",marginBottom:6}}>{isVia?"Via do Cliente":"Protocolo de Abertura"}</div>
            {cliente&&<div style={{fontSize:12,color:"#8a8782"}}>Cliente: {cliente.nome}</div>}

            <div style={{fontSize:12,color:"#8a8782"}}>Documentos: {docs.length} registrado(s)</div>
          </div>
        </div>
        <div style={S.modalFooter}>
          <button style={S.btnSec} onClick={onClose} className="bs">Fechar</button>
          <button style={S.btnPrimary} onClick={abrir} className="bp">Abrir para Imprimir</button>
        </div>
      </div>
    </div>
  );
};
